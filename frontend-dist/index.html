<script>
// -- src/api.js --
// API client — wraps all backend calls (FastAPI at localhost:8000)

const BASE = window.API_BASE || 'http://localhost:8000';

async function request(path, init) {
  const resp = await fetch(`${BASE}${path}`, init);
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(`HTTP ${resp.status}: ${text.slice(0, 200)}`);
  }
  return resp.json();
}

// ── Health ────────────────────────────────────────────────────────────────────
async function fetchHealth() {
  return request('/health');
}

// ── Templates ─────────────────────────────────────────────────────────────────
async function fetchTemplates(fileId) {
  const qs = fileId ? `?file_id=${encodeURIComponent(fileId)}` : '';
  return request(`/templates${qs}`);
}

function getTemplateThumbnailUrl(templateId, pageId, fileId, refresh) {
  const qs = new URLSearchParams({ page_id: pageId });
  if (fileId) qs.set('file_id', fileId);
  if (refresh) qs.set('refresh', '1');
  return `${BASE}/templates/${templateId}/thumbnail?${qs}`;
}

// ── Parse table ───────────────────────────────────────────────────────────────
async function parseTable(file, requiredFields, imageType) {
  const form = new FormData();
  form.append('file', file);
  if (requiredFields && requiredFields.length > 0) {
    form.append('required_fields', requiredFields.join(','));
  }
  if (imageType) form.append('image_type', imageType);
  const resp = await fetch(`${BASE}/parse-table`, { method: 'POST', body: form });
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(`解析失败 HTTP ${resp.status}: ${text.slice(0, 200)}`);
  }
  return resp.json();
}

// ── Compose ───────────────────────────────────────────────────────────────────
async function createCompose(req) {
  return request('/compose', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(req),
  });
}

async function getCompose(jobId) {
  return request(`/compose/${jobId}`);
}

async function listComposes(limit = 20) {
  return request(`/compose?limit=${limit}`);
}

function getImageUrl(jobId) {
  return `${BASE}/compose/${jobId}/image`;
}

// ── Grid export ───────────────────────────────────────────────────────────────
async function exportGrid(jobId, rows, cols) {
  return request('/export/grid', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ job_id: jobId, rows, cols }),
  });
}

function getGridCellUrl(jobId, index) {
  return `${BASE}/export/grid/${jobId}/${String(index).padStart(2, '0')}`;
}

// ── Chat ──────────────────────────────────────────────────────────────────────
async function chatWithAI(messages, context) {
  const resp = await fetch(`${BASE}/chat`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, context: context || {} }),
  });
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(`HTTP ${resp.status}: ${text.slice(0, 200)}`);
  }
  const data = await resp.json();
  return data.reply;
}

// ── Products ──────────────────────────────────────────────────────────────────
async function fetchProducts() {
  return request('/products');
}

async function fetchImageTypes() {
  const res = await request('/image-types');
  return res.types;
}

window.API = {
  fetchHealth,
  fetchTemplates,
  getTemplateThumbnailUrl,
  parseTable,
  createCompose,
  getCompose,
  listComposes,
  getImageUrl,
  exportGrid,
  getGridCellUrl,
  chatWithAI,
  fetchProducts,
  fetchImageTypes,
};

</script>

<script type="text/babel">
// -- src/Placeholders.jsx --
// Striped / gradient placeholder imagery. No hand-drawn illustrations.

const hashHue = (s) => {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return Math.abs(h) % 360;
};

const Stripe = ({ label, ratio = '4/5', tone = 'neutral', seed = 'x', tag }) => {
  const hue = tone === 'accent' ? 275 : tone === 'warm' ? 40 : hashHue(seed);
  const light = tone === 'accent' ? 0.92 : 0.96;
  const light2 = tone === 'accent' ? 0.88 : 0.93;
  return (
    <div style={{
      aspectRatio: ratio,
      position: 'relative',
      borderRadius: 8,
      overflow: 'hidden',
      background: `repeating-linear-gradient(135deg, oklch(${light} 0.02 ${hue}) 0 8px, oklch(${light2} 0.025 ${hue}) 8px 16px)`,
      border: '1px solid var(--line-2)',
    }}>
      {label && (
        <div className="mono" style={{
          position: 'absolute', left: 8, top: 8,
          fontSize: 9, letterSpacing: '0.02em',
          color: `oklch(0.45 0.05 ${hue})`,
          textTransform: 'uppercase',
        }}>{label}</div>
      )}
      {tag && (
        <div style={{
          position: 'absolute', right: 8, bottom: 8,
          fontSize: 10, color: `oklch(0.35 0.05 ${hue})`,
          background: 'rgba(255,255,255,0.85)',
          backdropFilter: 'blur(4px)',
          padding: '2px 6px', borderRadius: 4,
        }}>{tag}</div>
      )}
    </div>
  );
};

const Swatch = ({ color, label }) => (
  <div style={{ display: 'flex', flexDirection: 'column', gap: 4, minWidth: 0 }}>
    <div style={{ height: 28, borderRadius: 6, background: color, border: '1px solid rgba(0,0,0,0.05)' }}/>
    <div className="mono" style={{ fontSize: 9, color: 'var(--ink-3)', overflow: 'hidden', textOverflow: 'ellipsis' }}>{label}</div>
  </div>
);

window.Stripe = Stripe;
window.Swatch = Swatch;

</script>

const StatusChip = ({ color, label, value, pulse, title }) => (

<script type="text/babel">
// -- src/TemplatePanel.jsx --
// Left panel — template library, backed by GET /templates

const TEMPLATE_CATS = ['All', 'Social', 'E-commerce', 'Brand', 'Print', 'Web', 'Packaging'];

// Map template name keywords → category (best-effort)
function inferCat(name) {
  const n = (name || '').toLowerCase();
  if (n.includes('social') || n.includes('xiaohongshu') || n.includes('小红书') || n.includes('weibo') || n.includes('微博') || n.includes('story')) return 'Social';
  if (n.includes('product') || n.includes('产品') || n.includes('ecom') || n.includes('detail') || n.includes('主图')) return 'E-commerce';
  if (n.includes('brand') || n.includes('品牌') || n.includes('card')) return 'Brand';
  if (n.includes('print') || n.includes('poster') || n.includes('海报') || n.includes('editorial') || n.includes('catalog')) return 'Print';
  if (n.includes('web') || n.includes('banner') || n.includes('launch')) return 'Web';
  if (n.includes('pack') || n.includes('packaging') || n.includes('label') || n.includes('sticker')) return 'Packaging';
  return 'E-commerce'; // 默认归 E-commerce
}

function inferRatio(w, h) {
  if (!w || !h) return '1/1';
  const g = (a, b) => b === 0 ? a : g(b, a % b);
  const d = g(w, h);
  return `${w / d}/${h / d}`;
}

const TemplateCard = ({ t, active, onClick }) => {
  const [imgError, setImgError] = React.useState(false);
  const ratio = inferRatio(t.width, t.height);
  const tone = inferCat(t.name) === 'Social' ? 'accent' : inferCat(t.name) === 'Brand' ? 'warm' : 'neutral';

  return (
    <button onClick={onClick} style={{
      display: 'block', textAlign: 'left',
      padding: 6, borderRadius: 10,
      border: active ? '1.5px solid var(--accent)' : '1px solid transparent',
      background: active ? 'var(--accent-soft)' : 'transparent',
      transition: 'all 120ms ease',
      position: 'relative',
      width: '100%',
    }}
    onMouseEnter={(e) => { if (!active) e.currentTarget.style.background = 'var(--panel-2)'; }}
    onMouseLeave={(e) => { if (!active) e.currentTarget.style.background = active ? 'var(--accent-soft)' : 'transparent'; }}>

      {/* Thumbnail or fallback stripe */}
      {t.thumbnail_url && !imgError ? (
        <div style={{ aspectRatio: ratio, borderRadius: 8, overflow: 'hidden', border: '1px solid var(--line-2)', position: 'relative' }}>
          <img
            src={t.thumbnail_url}
            alt={t.name}
            onError={() => setImgError(true)}
            style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }}
          />
        </div>
      ) : (
        <Stripe label={t.name.split(' ')[0]} ratio={ratio} tone={tone} seed={t.id} tag={`${t.width}×${t.height}`}/>
      )}

      <div style={{ padding: '6px 2px 2px', display: 'flex', alignItems: 'center', gap: 5 }}>
        <div style={{ fontSize: 11.5, fontWeight: 500, color: 'var(--ink)', flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{t.name}</div>
        <span className="mono" style={{ fontSize: 9, color: 'var(--ink-3)', flexShrink: 0 }}>{t.slots?.length || 0} slots</span>
      </div>

      {active && (
        <div style={{
          position: 'absolute', top: 10, right: 10,
          width: 18, height: 18, borderRadius: 99,
          background: 'var(--accent)', color: 'white',
          display: 'grid', placeItems: 'center',
          boxShadow: '0 2px 6px oklch(0.55 0.22 275 / 0.35)',
        }}>
          <I.check size={11} stroke={3}/>
        </div>
      )}
    </button>
  );
};

const TemplatePanel = ({ activeId, onSelect }) => {
  const [cat, setCat] = React.useState('All');
  const [q, setQ] = React.useState('');
  const [templates, setTemplates] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState(null);

  // Load templates from backend
  React.useEffect(() => {
    let alive = true;
    setLoading(true);
    setError(null);
    API.fetchTemplates()
      .then(data => { if (alive) { setTemplates(data); setLoading(false); } })
      .catch(e => { if (alive) { setError(e.message); setLoading(false); } });
    return () => { alive = false; };
  }, []);

  const filtered = templates.filter(t => {
    const tcat = inferCat(t.name);
    return (cat === 'All' || tcat === cat) &&
      (!q || t.name.toLowerCase().includes(q.toLowerCase()));
  });

  // Masonry: two columns, distribute by index
  const colA = filtered.filter((_, i) => i % 2 === 0);
  const colB = filtered.filter((_, i) => i % 2 === 1);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--panel)', borderRight: '1px solid var(--line)' }}>
      {/* Header */}
      <div style={{ padding: '14px 14px 10px', flexShrink: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
          <div style={{ fontSize: 13, fontWeight: 600, letterSpacing: '-0.01em' }}>Templates</div>
          {/* Refresh button */}
          <button
            onClick={() => {
              setLoading(true); setError(null);
              API.fetchTemplates()
                .then(setTemplates)
                .catch(e => setError(e.message))
                .finally(() => setLoading(false));
            }}
            style={{ padding: 4, borderRadius: 5, color: 'var(--ink-3)' }}
            title="Refresh templates"
          >
            <I.refresh size={12}/>
          </button>
        </div>

        {/* Search */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 7,
          padding: '7px 10px', borderRadius: 7,
          background: 'var(--panel-2)',
          border: '1px solid var(--line-2)',
        }}>
          <I.search size={13} style={{ color: 'var(--ink-3)' }}/>
          <input
            value={q} onChange={(e) => setQ(e.target.value)}
            placeholder="搜索模板…"
            style={{
              flex: 1, border: 'none', outline: 'none', background: 'transparent',
              fontSize: 12, color: 'var(--ink)',
            }}
          />
        </div>
      </div>

      {/* Category chips */}
      <div style={{
        padding: '0 14px 10px',
        display: 'flex', gap: 4, flexShrink: 0,
        overflowX: 'auto', scrollbarWidth: 'none',
      }}>
        {TEMPLATE_CATS.map(c => (
          <button key={c} onClick={() => setCat(c)} style={{
            fontSize: 11, padding: '4px 9px', borderRadius: 99,
            background: cat === c ? 'var(--ink)' : 'transparent',
            color: cat === c ? 'white' : 'var(--ink-2)',
            fontWeight: cat === c ? 500 : 400,
            whiteSpace: 'nowrap',
            border: cat === c ? 'none' : '1px solid var(--line)',
            transition: 'all 120ms',
          }}>{c}</button>
        ))}
      </div>

      {/* Main list area */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '0 10px 14px' }}>
        {loading && (
          <div style={{ padding: 24, textAlign: 'center', color: 'var(--ink-3)', fontSize: 12, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 16, height: 16, borderRadius: 99, border: '2px solid var(--line-2)', borderTopColor: 'var(--accent)', animation: 'spin 0.8s linear infinite' }}/>
            Loading templates…
            <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
          </div>
        )}

        {error && !loading && (
          <div style={{ padding: '16px 12px', fontSize: 12 }}>
            <div style={{ color: 'oklch(0.55 0.15 25)', fontWeight: 500, marginBottom: 4 }}>Failed to load</div>
            <div style={{ color: 'var(--ink-3)', fontSize: 11, marginBottom: 10, lineHeight: 1.45 }}>{error}</div>
            <button
              onClick={() => {
                setLoading(true); setError(null);
                API.fetchTemplates().then(setTemplates).catch(e => setError(e.message)).finally(() => setLoading(false));
              }}
              style={{ fontSize: 11, padding: '5px 10px', borderRadius: 6, border: '1px solid var(--line)', color: 'var(--ink-2)', background: 'var(--panel)' }}
            >Retry</button>
          </div>
        )}

        {!loading && !error && filtered.length === 0 && (
          <div style={{ padding: 24, textAlign: 'center', color: 'var(--ink-3)', fontSize: 12 }}>
            {templates.length === 0 ? 'No templates found in Penpot' : `No templates match "${q}"`}
          </div>
        )}

        {!loading && !error && filtered.length > 0 && (
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4 }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
              {colA.map(t => <TemplateCard key={t.id} t={t} active={activeId === t.id} onClick={() => onSelect(t)}/>)}
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
              {colB.map(t => <TemplateCard key={t.id} t={t} active={activeId === t.id} onClick={() => onSelect(t)}/>)}
            </div>
          </div>
        )}
      </div>

      {/* Footer — 开发进度入口 */}
      <div style={{
        flexShrink: 0, borderTop: '1px solid var(--line)',

<script type="text/babel">
// -- src/ChatExtras.jsx --
// Slash commands, parse table, AI message list — additions to the chat surface.

const SLASH_COMMANDS = [
  { cmd: '/生图',    cn: '开始生图',   desc: '根据当前模板和产品数据生成图片', icon: 'zap',      shortcut: '⌘⏎', group: '生成' },
  { cmd: '/重新生成', cn: '重新生成',  desc: '用新的随机种子重新跑一遍',        icon: 'refresh',             group: '生成' },
  { cmd: '/放大',    cn: '放大',       desc: '将选中结果放大到 2K / 4K',        icon: 'layers',              group: '生成' },
  { cmd: '/出变体',  cn: '出更多版本', desc: '基于选中结果再出 4 个变体',        icon: 'grid',                group: '生成' },

  { cmd: '/分析',    cn: '分析素材',   desc: '解析上传的图片、简报或 CSV',       icon: 'eye',                 group: '工具' },
  { cmd: '/配色',    cn: '提取配色',   desc: '从参考图中提取色板',               icon: 'palette',             group: '工具' },
  { cmd: '/换尺寸',  cn: '换尺寸',     desc: '将设计重排为新的比例',             icon: 'dims',                group: '工具' },
  { cmd: '/换文案',  cn: '换文案',     desc: '重写图上的文字',                   icon: 'type',                group: '工具' },

  { cmd: '/导出',    cn: '导出PNG',    desc: '将结果导出为 PNG 文件',            icon: 'download',            group: '导出' },
  { cmd: '/九宫格',  cn: '切九宫格',   desc: '将结果切成 3×3 九宫格',           icon: 'grid',                group: '导出' },
  { cmd: '/分享',    cn: '分享链接',   desc: '生成可分享的预览链接',             icon: 'share',               group: '导出' },
];

const SlashMenu = ({ query, onPick, onClose }) => {
  const q = query.toLowerCase().replace(/^\//, '');
  const filtered = SLASH_COMMANDS.filter(c =>
    !q || c.cmd.includes(query.replace(/^\//, '')) || c.cn.includes(q) || c.desc.includes(q)
  );

  const groups = filtered.reduce((acc, c) => {
    (acc[c.group] ||= []).push(c); return acc;
  }, {});

  const [hover, setHover] = React.useState(0);
  React.useEffect(() => setHover(0), [query]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') { onClose(); return; }
      if (e.key === 'ArrowDown') { e.preventDefault(); setHover(h => Math.min(filtered.length - 1, h + 1)); }
      if (e.key === 'ArrowUp')   { e.preventDefault(); setHover(h => Math.max(0, h - 1)); }
      if (e.key === 'Enter' || e.key === 'Tab') {
        if (filtered[hover]) { e.preventDefault(); onPick(filtered[hover]); }
      }
    };
    window.addEventListener('keydown', onKey, true);
    return () => window.removeEventListener('keydown', onKey, true);
  }, [filtered, hover, onPick, onClose]);

  if (filtered.length === 0) {
    return (
      <div style={slashMenuStyle}>
        <div style={{ padding: 14, fontSize: 12, color: 'var(--ink-3)', textAlign: 'center' }}>
          没有匹配的指令「{query}」
        </div>
      </div>
    );
  }

  let idx = -1;
  return (
    <div style={slashMenuStyle}>
      <div style={{
        padding: '8px 12px 6px', fontSize: 10, color: 'var(--ink-3)',
        display: 'flex', alignItems: 'center', gap: 8,
        borderBottom: '1px solid var(--line-2)',
      }} className="mono">
        <span style={{ textTransform: 'uppercase', letterSpacing: '0.08em' }}>指令</span>
        <div style={{ flex: 1 }}/>
        <span>↑↓ 选择 · ⏎ 确认 · esc 关闭</span>
      </div>

      <div style={{ maxHeight: 280, overflowY: 'auto', padding: 4 }}>
        {Object.entries(groups).map(([g, items]) => (
          <div key={g}>
            <div className="mono" style={{ padding: '6px 10px 2px', fontSize: 9.5, color: 'var(--ink-3)', textTransform: 'uppercase', letterSpacing: '0.07em' }}>{g}</div>
            {items.map(c => {
              idx++;
              const active = idx === hover;
              return (
                <button
                  key={c.cmd}
                  onMouseEnter={((i) => () => setHover(i))(idx)}
                  onClick={() => onPick(c)}
                  style={{
                    width: '100%', textAlign: 'left',
                    display: 'flex', alignItems: 'center', gap: 10,
                    padding: '7px 10px', borderRadius: 6,
                    background: active ? 'var(--accent-soft)' : 'transparent',
                  }}>
                  <div style={{
                    width: 22, height: 22, borderRadius: 5,
                    background: active ? 'var(--accent)' : 'var(--panel-2)',
                    color: active ? 'white' : 'var(--ink-2)',
                    display: 'grid', placeItems: 'center', flexShrink: 0,
                  }}>
                    {I[c.icon] ? I[c.icon]({ size: 12 }) : <I.bolt size={12}/>}
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
                      <span className="mono" style={{ fontSize: 11.5, fontWeight: 500, color: active ? 'var(--accent-ink)' : 'var(--ink)' }}>{c.cmd}</span>
                      <span style={{ fontSize: 10.5, color: 'var(--ink-3)' }}>{c.cn}</span>
                    </div>
                    <div style={{ fontSize: 10.5, color: 'var(--ink-3)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{c.desc}</div>
                  </div>
                  {c.shortcut && (
                    <kbd className="mono" style={{ fontSize: 9.5, color: 'var(--ink-3)', padding: '1px 5px', borderRadius: 3, border: '1px solid var(--line)' }}>{c.shortcut}</kbd>
                  )}
                </button>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
};

const slashMenuStyle = {
  position: 'absolute', bottom: 'calc(100% + 6px)', left: 0, right: 0,
  background: 'var(--panel)',
  border: '1px solid var(--line)',
  borderRadius: 10,
  boxShadow: '0 8px 32px rgba(20,22,40,0.10), 0 2px 6px rgba(20,22,40,0.04)',
  overflow: 'hidden',
  zIndex: 20,
};

// ---------- Parse table ----------

const ParseTable = ({ title, subtitle, rows, source }) => {
  return (
    <div style={{
      width: '100%', borderRadius: 10,
      background: 'var(--panel)', border: '1px solid var(--line-2)',
      overflow: 'hidden',
    }}>
      <div style={{ padding: '9px 12px', borderBottom: '1px solid var(--line-2)', display: 'flex', alignItems: 'center', gap: 8 }}>
        <div style={{ width: 20, height: 20, borderRadius: 5, background: 'var(--accent-soft)', color: 'var(--accent-ink)', display: 'grid', placeItems: 'center' }}>
          <I.file size={11}/>
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 11.5, fontWeight: 600 }}>{title}</div>
          {subtitle && <div className="mono" style={{ fontSize: 9.5, color: 'var(--ink-3)' }}>{subtitle}</div>}
        </div>
        {source && (
          <div className="mono" style={{ fontSize: 9.5, color: 'var(--ink-3)', padding: '2px 6px', borderRadius: 4, background: 'var(--panel-2)', border: '1px solid var(--line-2)' }}>

      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '92px 1fr 54px', fontSize: 11 }}>
        <HeadCell>字段</HeadCell>
        <HeadCell>内容</HeadCell>
        <HeadCell right>置信度</HeadCell>

        {rows.map((r, i) => (
          <React.Fragment key={i}>
            <Cell top={i > 0}>
              <span className="mono" style={{ color: 'var(--ink-3)', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.04em' }}>{r.field}</span>
            </Cell>
            <Cell top={i > 0}>
              {r.editable ? (
                <span style={{
                  display: 'inline-flex', alignItems: 'center', gap: 5,
                  padding: '2px 6px', borderRadius: 4,
                  background: 'var(--panel-2)', border: '1px dashed var(--line)',
                  fontSize: 11, color: 'var(--ink)',
                }}>
                  {r.value}
                  <I.type size={9} style={{ color: 'var(--ink-3)' }}/>
                </span>
              ) : (
                <span style={{ color: 'var(--ink)' }}>{r.value}</span>
              )}
              {r.note && <div style={{ fontSize: 10, color: 'var(--ink-3)', marginTop: 2 }}>{r.note}</div>}

        </button>
      </div>
    </div>
  );
};

const HeadCell = ({ children, right }) => (
  <div style={{
    padding: '6px 12px',
    fontSize: 9.5, color: 'var(--ink-3)',

const ConfBadge = ({ conf }) => {

const ghostBtn = {
  fontSize: 11, padding: '4px 9px', borderRadius: 5,

};

// ---------- AI structured message list ----------

const AIMessageList = ({ title, items }) => (
  <div style={{
    width: '100%', borderRadius: 10,

    <div style={{ padding: '9px 12px', borderBottom: '1px solid var(--line-2)', display: 'flex', alignItems: 'center', gap: 7 }}>

<script type="text/babel">
// -- src/Canvas.jsx --
// Middle canvas — shows selected template preview, compose progress, and result image.

const Canvas = ({ template, job, resultImageUrl, onJobUpdate }) => {
  const t = template;
  const isRunning = job && (job.status === 'pending' || job.status === 'running');
  const isDone = job && job.status === 'done';
  const isFailed = job && job.status === 'failed';

  return (
    <div style={{
      display: 'flex', flexDirection: 'column', minWidth: 0, minHeight: 0,
      overflow: 'hidden',
      background: 'var(--panel-2)',
    }}>
      {/* Toolbar */}
      <div style={{
        height: 44, flexShrink: 0,
        borderBottom: '1px solid var(--line)',
        display: 'flex', alignItems: 'center',
        padding: '0 16px', gap: 10,
        background: 'var(--panel)',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12 }}>
          <span className="mono" style={{ color: 'var(--ink-3)', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.06em' }}>Template</span>
          <span style={{ color: 'var(--ink)', fontWeight: 500 }}>{t?.name || 'None selected'}</span>
          {t && (
            <span className="mono" style={{ fontSize: 10, color: 'var(--ink-3)', padding: '2px 6px', borderRadius: 4, background: 'var(--panel-2)', border: '1px solid var(--line-2)' }}>
              {t.width}×{t.height}
            </span>
          )}
        </div>

        <div style={{ flex: 1 }}/>

        {/* Status badge */}
        {isRunning && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 11, color: 'var(--accent-ink)' }}>
            <div style={{ width: 8, height: 8, borderRadius: 99, background: 'var(--accent)', animation: 'pulse 1.2s ease-in-out infinite' }}/>
            AI 生图中…
          </div>
        )}
        {isDone && resultImageUrl && (
          <a href={resultImageUrl} download style={{ fontSize: 11, display: 'flex', alignItems: 'center', gap: 5, padding: '4px 10px', borderRadius: 6, background: 'var(--ink)', color: 'white', textDecoration: 'none' }}>
            <I.download size={11}/>
            下载 PNG
          </a>
        )}
        {t?.slots && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 11, color: 'var(--ink-3)' }}>
            <span className="mono">{t.slots.length} slots</span>
          </div>
        )}
        <style>{`@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }`}</style>
      </div>

      {/* Stage */}
      <div style={{
        flex: 1, minHeight: 0, overflow: 'hidden',
        position: 'relative',
        background: `radial-gradient(circle at 1px 1px, oklch(0.9 0.005 260) 1px, transparent 0)`,
        backgroundSize: '20px 20px',
        backgroundColor: 'oklch(0.98 0.003 260)',
      }}>
        {!t && <EmptyCanvas/>}
        {t && isRunning && <ComposeProgress job={job}/>}
        {t && isDone && resultImageUrl && <ResultImage url={resultImageUrl} job={job}/>}
        {t && isFailed && <FailedState error={job.error}/>}
        {t && !isRunning && !isDone && !isFailed && <TemplatePreview t={t}/>}
      </div>
    </div>
  );
};

// ── Empty state ───────────────────────────────────────────────────────────────

const EmptyCanvas = () => (
  <div style={{
    position: 'absolute', inset: 0,
    display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
    gap: 10, color: 'var(--ink-3)',
  }}>
    <div style={{
      width: 48, height: 48, borderRadius: 12,
      background: 'var(--panel)', border: '1px solid var(--line)',
      display: 'grid', placeItems: 'center',
    }}>
      <I.layers size={20} style={{ color: 'var(--ink-3)' }}/>
    </div>
    <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--ink-2)' }}>从左侧选择模板</div>
    <div style={{ fontSize: 11, color: 'var(--ink-3)' }}>选择后在此预览，然后通过 AI 对话开始生图</div>
  </div>
);

// ── Template preview (slot layout) ───────────────────────────────────────────

const TemplatePreview = ({ t }) => {
  const stageRef = React.useRef(null);
  const [box, setBox] = React.useState({ w: 560, h: 480 });
  const [thumbError, setThumbError] = React.useState(false);

  React.useEffect(() => {
    if (!stageRef.current) return;
    const ro = new ResizeObserver(entries => {
      for (const e of entries) {
        const { width, height } = e.contentRect;
        setBox({ w: Math.max(200, width - 80), h: Math.max(200, height - 120) });
      }
    });
    ro.observe(stageRef.current);
    return () => ro.disconnect();
  }, []);

  const tw = t.width || 1200;
  const th = t.height || 1200;
  const scale = Math.min(box.w / tw, box.h / th, 1);
  const pw = Math.round(tw * scale);
  const ph = Math.round(th * scale);

  const thumbUrl = t.thumbnail_url || API.getTemplateThumbnailUrl(t.id, t.page_id, t.file_id);
  const frameX = t.x || 0;
  const frameY = t.y || 0;

  return (
    <div ref={stageRef} style={{ position: 'absolute', inset: 0, display: 'grid', placeItems: 'center', padding: 24 }}>
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14 }}>
        {/* Template frame */}
        <div style={{
          position: 'relative',
          width: pw, height: ph,
          background: 'var(--panel)',
          borderRadius: 6,
          boxShadow: '0 30px 60px rgba(20,22,40,0.10), 0 4px 14px rgba(20,22,40,0.06), 0 0 0 1px var(--line)',
          overflow: 'hidden',
        }}>
          {/* Thumbnail */}
          {!thumbError && (
            <img
              src={thumbUrl}
              alt={t.name}
              onError={() => setThumbError(true)}
              style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover' }}
            />
          )}

          {/* Slot overlay SVG */}
          {t.slots && t.slots.length > 0 && (
            <svg
              style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}
              viewBox={`0 0 ${tw} ${th}`}
              preserveAspectRatio="none"
            >
              {t.slots.map(s => {
                const rx = s.x - frameX;
                const ry = s.y - frameY;
                const field = s.name.split('/')[2];
                const isImage = s.type === 'rect' || field === 'image';
                const isText = s.type === 'text';
                const stroke = isImage ? '#22c55e' : isText ? '#3b82f6' : '#eab308';
                const fill = isImage ? '#22c55e18' : isText ? '#3b82f618' : '#eab30818';
                return (
                  <g key={s.id}>
                    <rect x={rx} y={ry} width={s.width} height={s.height}
                      fill={fill} stroke={stroke} strokeWidth={2} strokeDasharray="6 4" rx={4}/>
                    <text x={rx + s.width / 2} y={ry + s.height / 2 + 4}
                      textAnchor="middle" fontSize={Math.min(14, s.height * 0.25)}
                      fill={stroke} fontFamily="monospace" opacity={0.9}>
                      {field || s.name}
                    </text>
                  </g>
                );
              })}
            </svg>
          )}

          {/* Fallback stripe if no thumbnail */}
          {thumbError && (
            <Stripe ratio={`${tw}/${th}`} tone="neutral" seed={t.id} label={t.name.split(' ')[0]}/>
          )}

          <Handles/>
        </div>

        {/* Meta strip */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 10,
          padding: '6px 12px', borderRadius: 99,
          background: 'var(--panel)',
          border: '1px solid var(--line)',
          boxShadow: 'var(--shadow-1)',
          fontSize: 11,
        }}>
          <span className="mono" style={{ color: 'var(--ink-3)' }}>{tw} × {th}</span>
          <span style={{ width: 3, height: 3, borderRadius: 99, background: 'var(--line)' }}/>
          <span className="mono" style={{ color: 'var(--ink-2)' }}>{t.slots?.length || 0} slots</span>
          <span style={{ width: 3, height: 3, borderRadius: 99, background: 'var(--line)' }}/>
          <span style={{ color: 'var(--ink-2)' }}>通过对话开始填充 →</span>
        </div>
      </div>
    </div>
  );
};

// ── Compose progress ──────────────────────────────────────────────────────────

function friendlyProgress(msg) {
  if (!msg) return null;
  if (msg.includes('等待合成队列')) return '等待生图队列…';
  if (msg.includes('复制模板文件')) return '正在创建独立副本…';
  if (msg.includes('副本就绪')) return '副本创建完成';
  if (msg.includes('读取模板图层')) return '读取模板结构';
  if (msg.includes('上传图片')) {
    const m = msg.match(/上传图片.*?→\s*(slot\/.+)/);
    return m ? `上传图片 → ${m[1].replace('slot/', '').replace('/image', '')}` : '上传产品图片';
  }
  if (msg.includes('写入文字')) {
    const m = msg.match(/「(.+?)」/);
    return m ? `写入文字：${m[1]}` : '写入文字内容';
  }
  if (msg.includes('隐藏空图层')) return null;
  if (msg.includes('提交') && msg.includes('变更')) {
    const m = msg.match(/(\d+)/);
    return m ? `提交 ${m[1]} 处变更` : '提交变更';
  }
  if (msg.includes('无变更')) return '无需变更，直接导出';
  if (msg.includes('导出 PNG')) return '正在渲染导出图片…';
  if (msg.includes('完成') && msg.includes('输出')) return '导出完成';
  if (msg.includes('Penpot 编辑链接')) return null;
  if (msg.includes('失败')) return null;
  return msg;
}

const ComposeProgress = ({ job }) => {
  const logRef = React.useRef(null);
  const lines = (job.progress || []).map(friendlyProgress).filter(Boolean);

  React.useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [lines.length]);

  return (
    <div style={{
      position: 'absolute', inset: 0,
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      padding: 40,
    }}>
      <div style={{
        width: '100%', maxWidth: 480,
        background: 'var(--panel)', border: '1px solid var(--line)',
        borderRadius: 12, overflow: 'hidden',
        boxShadow: '0 8px 32px rgba(20,22,40,0.08)',
      }}>
        {/* Header */}
        <div style={{
          padding: '12px 16px',
          borderBottom: '1px solid var(--line-2)',
          display: 'flex', alignItems: 'center', gap: 10,
          background: 'var(--panel-2)',
        }}>
          <div style={{ width: 16, height: 16, borderRadius: 99, border: '2px solid var(--line-2)', borderTopColor: 'var(--accent)', animation: 'spin 0.8s linear infinite' }}/>
          <span style={{ fontSize: 13, fontWeight: 600 }}>AI 生图中</span>
          <span className="mono" style={{ fontSize: 10, color: 'var(--ink-3)' }}>job · {job.id?.slice(0, 8)}</span>
          <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </div>

        {/* Log */}
        <div ref={logRef} style={{
          padding: '10px 0', maxHeight: 260, overflowY: 'auto',
          fontFamily: 'JetBrains Mono, monospace', fontSize: 11.5,
        }}>
          {lines.length === 0 && (
            <div style={{ padding: '6px 16px', color: 'var(--ink-3)', display: 'flex', gap: 8, alignItems: 'center' }}>
              <span style={{ color: 'var(--accent)' }}>·</span>
              <span>正在启动…</span>
            </div>
          )}
          {lines.map((line, i) => {
            const isActive = i === lines.length - 1;
            return (
              <div key={i} style={{
                padding: '5px 16px',
                display: 'flex', gap: 10, alignItems: 'center',
                color: isActive ? 'var(--ink)' : 'var(--ink-3)',
              }}>
                {isActive
                  ? <span style={{ color: 'var(--accent)', fontWeight: 700, width: 14, textAlign: 'center' }}>·</span>
                  : <span style={{ color: 'var(--ok)', width: 14, textAlign: 'center' }}>✓</span>
                }
                <span>{line}</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

// ── Result image ──────────────────────────────────────────────────────────────

const ResultImage = ({ url, job }) => (

const FailedState = ({ error }) => (

  for (const slot of (template.slots || [])) {
    const field = slot.name.split('/')[2];
    if (!field) continue;
    if (field === 'image' || slot.type === 'rect') continue;
    fields.add(field);

// Slash command popup
const SLASH_COMMANDS_LIST = [
  { cmd: '/开始生图', desc: '启动 AI 生图任务',    icon: 'zap' },
  { cmd: '/导出PNG',  desc: '下载生图结果图片',    icon: 'download' },

];

const SlashPopup = ({ input, onPick }) => {

  );

          <div style={{

          </div>
          <div>

              <span className="mono" style={{ fontSize: 12, fontWeight: 600, color: 'var(--accent-ink)' }}>{c.cmd}</span>

      ))}

};

// ─── Main ─────────────────────────────────────────────────────────────────────

let _mid = 100;
const nid = () => String(++_mid);

const WELCOME = `你好！我是 AI 助手，可以帮你操作生图流程。

快速开始：
1. 在左侧选择模板
2. 点击 ⌀ 上传产品需求表格（Excel / CSV）
3. 输入 /开始生图 或点击「开始生图」按钮

快捷指令：/开始生图  /导出PNG  /切九宫格`;

const Chat = ({ template, onJobUpdate, onResultUrl }) => {
  const [messages, setMessages] = React.useState([
    { id: '0', role: 'ai', content: WELCOME },
  ]);
  const [input, setInput] = React.useState('');
  const [uploading, setUploading] = React.useState(false);
  const [showSlash, setShowSlash] = React.useState(false);
  const [imageTypes, setImageTypes] = React.useState([]);
  const [selectedImageType, setSelectedImageType] = React.useState('');
  const [currentJob, setCurrentJob] = React.useState(null);
  const [parsedProducts, setParsedProducts] = React.useState(null);

  const selectedTypeRef = React.useRef('');
  const pendingFileRef = React.useRef(null);
  const bottomRef = React.useRef(null);
  const fileRef = React.useRef(null);
  const pollRef = React.useRef(null);
  const prevStatusRef = React.useRef(undefined);

  // Load image types
  React.useEffect(() => {
    API.fetchImageTypes().then(types => {
      setImageTypes(types);
      const first = types.find(t => t.exists);
      if (first) { setSelectedImageType(first.key); selectedTypeRef.current = first.key; }
    }).catch(() => {});
  }, []);

  const setType = (k) => { setSelectedImageType(k); selectedTypeRef.current = k; };

  const push = (msg) => {
    const m = { id: nid(), ...msg };
    setMessages(prev => [...prev, m]);
    return m.id;
  };
  const patch = (id, delta) => setMessages(prev => prev.map(m => m.id === id ? { ...m, ...delta } : m));
  const scrollBottom = () => setTimeout(() => bottomRef.current?.scrollIntoView({ behavior: 'smooth' }), 50);

  // Poll job
  React.useEffect(() => {
    if (!currentJob || currentJob.status === 'done' || currentJob.status === 'failed') {
      if (pollRef.current) clearInterval(pollRef.current);
      return;
    }
    pollRef.current = setInterval(async () => {
      try {
        const updated = await API.getCompose(currentJob.id);
        setCurrentJob(updated);
        if (onJobUpdate) onJobUpdate(updated);
      } catch {}
    }, 2000);
    return () => { if (pollRef.current) clearInterval(pollRef.current); };
  }, [currentJob?.id, currentJob?.status]);

  // Job status → chat messages
  React.useEffect(() => {
    const status = currentJob?.status;
    const prev = prevStatusRef.current;
    prevStatusRef.current = status;
    if (status === 'done' && prev !== 'done') {
      const imgUrl = API.getImageUrl(currentJob.id);
      if (onResultUrl) onResultUrl(imgUrl);
      const editUrl = currentJob.penpot_edit_url;
      push({
        role: 'ai',
        content: '✅ 生图完成！结果已显示在预览区。',
        actions: [
          { label: '导出 PNG', primary: true, handler: () => { push({ role: 'user', content: '导出 PNG' }); doExportPng(imgUrl, currentJob.id); scrollBottom(); } },
          { label: '切九宫格', handler: () => { push({ role: 'user', content: '切九宫格' }); doExportGrid(currentJob.id); scrollBottom(); } },
          ...(editUrl ? [{ label: '在 Penpot 中修改', handler: () => window.open(editUrl, '_blank') }] : []),
        ],
      });
      scrollBottom();
    } else if (status === 'failed' && prev !== 'failed') {
      push({ role: 'ai', content: `❌ 生图失败：${currentJob.error || '未知错误'}` });
      scrollBottom();
    }
  }, [currentJob?.status]);

  // Send text
  async function handleSend() {
    const text = input.trim();
    if (!text) return;
    setInput(''); setShowSlash(false);
    push({ role: 'user', content: text });
    scrollBottom();
    if (text.startsWith('/')) {
      const cmd = text.split(' ')[0].toLowerCase();
      if (cmd === '/开始生图') await doCompose();
      else if (cmd === '/导出png') doExportPng();
      else if (cmd === '/切九宫格') await doExportGrid();
      else push({ role: 'ai', content: `未知指令：${text}\n\n可用指令：/开始生图、/导出PNG、/切九宫格` });
      scrollBottom(); return;
    }
    await handleText(text);
    scrollBottom();
  }

  async function handleText(text) {
    const lower = text.toLowerCase();
    if (lower.includes('导出') && lower.includes('九宫格')) { await doExportGrid(); return; }
    if (lower.includes('导出') || lower.includes('png')) { doExportPng(); return; }
    if (lower.includes('生图') || lower.includes('合成') || lower.includes('生成') || lower.includes('开始')) { await doCompose(); return; }
    // AI chat
    const history = messages.filter(m => m.content && (m.role === 'user' || m.role === 'ai')).slice(-10)
      .map(m => ({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.content }));
    history.push({ role: 'user', content: text });
    const ctx = { templateName: template?.name, templateSlotCount: template?.slots?.length, productCount: parsedProducts?.length, jobStatus: currentJob?.status, hasResult: currentJob?.status === 'done' };
    const tid = push({ role: 'ai', content: null, typing: true });
    scrollBottom();
    try {
      const reply = await API.chatWithAI(history, ctx);
      patch(tid, { content: reply, typing: false });
    } catch {
      patch(tid, { content: 'AI 暂时不可用，请检查后端是否启动或 API Key 是否配置。', typing: false });
    }
  }

  // File upload
  async function handleFileChange(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    e.target.value = '';
    push({ role: 'user', content: `上传了表格：${file.name}` });
    scrollBottom();
    if (imageTypes.length > 0) {
      pendingFileRef.current = file;
      push({
        role: 'ai',
        content: '请选择本次生图使用的图片类型，系统将从对应素材文件夹匹配产品图：',
        actions: [{ label: '确认解析', primary: true, handler: () => doParseWithType(pendingFileRef.current) }],
        extra: { type: 'image-type-selector' },
      });
      scrollBottom();
    } else {
      await doParseWithType(file);
    }
  }

  async function doParseWithType(file) {
    setUploading(true);
    const requiredFields = deriveRequiredFields(template);
    const currentType = selectedTypeRef.current;
    const tid = push({ role: 'ai', content: '正在读取表格…' });
    scrollBottom();
    try {
      const result = await API.parseTable(file, requiredFields.length ? requiredFields : undefined, currentType || undefined);
      patch(tid, { content: '正在匹配产品图库…' });
      await new Promise(r => setTimeout(r, 600));
      patch(tid, { content: null }); // hide
      await handleParseResult(result);
    } catch (err) {
      patch(tid, { content: `解析失败：${String(err)}` });
    } finally {
      setUploading(false);
      scrollBottom();
    }
  }

  async function handleParseResult(result) {
    const products = result.products;
    setParsedProducts(products);
    const imgMatched = products.filter(p => p.image_path).length;
    const imgMissed = products.length - imgMatched;
    const total = products.length;
    const tplCount = template
      ? new Set((template.slots || []).map(s => s.name.split('/')[1]).filter(Boolean)).size : 0;
    let lead = '';
    if (!template) {
      lead = `分析完成，识别到 ${total} 款产品，图片匹配了 ${imgMatched} 张。记得在左侧选一个模板，然后就可以生图了。`;
    } else if (tplCount === total && imgMissed === 0) {
      lead = `好的，${total} 款产品和「${template.name}」完全匹配，图片也全部找到了，可以直接生图。`;
    } else if (tplCount === total) {
      lead = `${total} 款产品和模板数量吻合，不过有 ${imgMissed} 张图没找到，生图时那几个位置会留空。`;
    } else {
      const diff = total - tplCount;
      lead = diff > 0
        ? `表格有 ${total} 款，模板只有 ${tplCount} 个位置，我会用前 ${tplCount} 款来生图。`
        : `模板需要 ${tplCount} 款产品，表格只提供了 ${total} 款，剩余位置留空处理。`;
    }
    push({
      role: 'ai', content: lead,
      actions: [{ label: '开始生图', primary: true, handler: () => { push({ role: 'user', content: '开始生图' }); doCompose(products); scrollBottom(); } }],
      extra: { type: 'parse-result', products, imgMatched, imgMissed },
    });
  }

  // Compose
  async function doCompose(products) {
    const prods = products || parsedProducts;
    if (!template) { push({ role: 'ai', content: '请先在左侧选择一个模板。' }); return; }
    if (!prods || !prods.length) { push({ role: 'ai', content: '还没有填入产品信息，请先上传需求表格。' }); return; }
    const slots = {};
    prods.forEach((p, i) => { slots[`product_${i+1}`] = { image_path: p.image_path ?? null, name: p.name ?? null, price: p.price ?? null, tag: p.tag ?? null, spec: p.spec ?? null }; });
    push({ role: 'ai', content: '✨ AI 正在生图，请稍候…\n\n中间预览区实时显示进度。' });
    scrollBottom();
    try {
      const job = await API.createCompose({ file_id: template.file_id, template_frame_id: template.id, page_id: template.page_id, slots, export_scale: 2 });
      setCurrentJob(job);
      if (onJobUpdate) onJobUpdate(job);
      push({ role: 'ai', content: `⚡ 生图任务已启动\n\n任务 ID：${job.id.slice(0, 8)}，完成后自动显示结果。` });
    } catch (err) {
      push({ role: 'ai', content: `生图启动失败：${String(err)}` });
    }
    scrollBottom();
  }

  // Export PNG
  function doExportPng(urlOverride, jobIdOverride) {
    const url = urlOverride || (currentJob?.status === 'done' ? API.getImageUrl(currentJob.id) : null);
    if (!url) { push({ role: 'ai', content: '还没有完成的生图结果，请先生图。' }); return; }
    const a = document.createElement('a');
    a.href = url; a.download = `result_${(jobIdOverride || currentJob?.id || 'img').slice(0, 8)}.png`; a.click();
    push({ role: 'ai', content: 'PNG 下载已开始。' });
  }

  // Export grid
  async function doExportGrid(jobIdOverride) {
    const jobId = jobIdOverride || currentJob?.id;
    const isDone = jobIdOverride ? true : currentJob?.status === 'done';
    if (!jobId || !isDone) { push({ role: 'ai', content: '请先完成生图，再切九宫格。' }); return; }
    push({ role: 'ai', content: '正在切九宫格…' });
    scrollBottom();
    try {
      const result = await API.exportGrid(jobId, 3, 3);
      const urls = (result.files || []).map((_, i) => API.getGridCellUrl(result.job_id || jobId, i));
      push({
        role: 'ai',
        content: `九宫格已生成，共 ${urls.length} 张，可在中栏预览或点击下载。`,
        actions: urls.map((url, i) => ({
          label: `下载第 ${i+1} 格`,
          handler: () => { const a = document.createElement('a'); a.href = url; a.download = `grid_${i+1}.png`; a.click(); },
        })),
      });
    } catch (err) {
      push({ role: 'ai', content: `切图失败：${String(err)}` });
    }
    scrollBottom();
  }

  const isWorking = uploading || currentJob?.status === 'running' || currentJob?.status === 'pending';

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--panel)', borderLeft: '1px solid var(--line)' }}>

      {/* Header */}
      <div style={{ height: 44, flexShrink: 0, display: 'flex', alignItems: 'center', padding: '0 14px', gap: 8, borderBottom: '1px solid var(--line)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
          <span style={{
            width: 7, height: 7, borderRadius: 99,
            background: isWorking ? 'var(--accent)' : 'var(--ok)',
            animation: isWorking ? 'pulse 1.2s ease-in-out infinite' : 'none',
          }}/>
          <span style={{ fontSize: 13, fontWeight: 600, letterSpacing: '-0.01em' }}>Loom</span>
          <span className="mono" style={{ fontSize: 10, color: 'var(--ink-3)' }}>
            {uploading ? '解析中…' : currentJob?.status === 'running' ? '生图中…' : parsedProducts ? `${parsedProducts.length} 款产品` : '就绪'}
          </span>
        </div>
        <div style={{ flex: 1 }}/>
        {parsedProducts && (
          <span className="mono" style={{ fontSize: 9.5, color: 'var(--ok)', padding: '2px 6px', borderRadius: 4, background: 'oklch(0.95 0.04 155)', border: '1px solid oklch(0.88 0.06 155)' }}>
            {parsedProducts.length} 款已载入
          </span>
        )}
        <button onClick={() => { setMessages([{ id: '0', role: 'ai', content: WELCOME }]); setParsedProducts(null); setCurrentJob(null); setInput(''); }} style={{ padding: 5, borderRadius: 5, color: 'var(--ink-3)' }} title="清空对话">
          <I.refresh size={13}/>
        </button>
        <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}`}</style>
      </div>

      {/* Messages */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '16px 14px 10px', display: 'flex', flexDirection: 'column', gap: 14 }}>
        {messages.map(msg => {
          if (msg.content === null && !msg.typing && !msg.extra && !msg.actions) return null;
          const who = msg.role === 'ai' ? 'ai' : 'user';
          return (
            <Bubble key={msg.id} who={who} meta={who === 'ai' && msg.meta ? msg.meta : undefined}>
              {msg.typing
                ? <TypingDots/>
                : msg.content && <TextBubble who={who} text={msg.content}/>
              }
              {msg.extra?.type === 'parse-result' && (
                <ParseCard products={msg.extra.products} imgMatched={msg.extra.imgMatched} imgMissed={msg.extra.imgMissed}/>
              )}
              {msg.extra?.type === 'image-type-selector' && (
                <ImageTypeSelector types={imageTypes} selected={selectedImageType} onSelect={setType}/>
              )}
              {msg.actions?.length > 0 && <ActionRow actions={msg.actions}/>}
            </Bubble>
          );
        })}
        <div ref={bottomRef}/>
      </div>

      {/* Composer */}
      <div style={{ flexShrink: 0, padding: 12, borderTop: '1px solid var(--line)', background: 'var(--panel)', position: 'relative' }}>
        {/* Quick command pills */}
        <div style={{ display: 'flex', gap: 4, marginBottom: 8, flexWrap: 'wrap' }}>
          {['/开始生图', '/导出PNG', '/切九宫格'].map(s => (
            <button key={s} onClick={() => { setInput(s); }} style={{
              fontSize: 10.5, padding: '2px 8px', borderRadius: 99,
              color: 'var(--accent-ink)', background: 'var(--accent-soft)',
              fontFamily: 'JetBrains Mono, monospace',
            }}>{s}</button>
          ))}
        </div>

        {/* Input box */}
        <div style={{
          borderRadius: 12,
          border: showSlash ? '1px solid var(--accent)' : '1px solid var(--line)',
          background: 'var(--panel-2)', padding: 10,
          display: 'flex', alignItems: 'center', gap: 6,
          boxShadow: showSlash ? '0 0 0 4px var(--accent-soft)' : 'var(--shadow-1)',
          transition: 'box-shadow 150ms, border-color 150ms',
          position: 'relative',
        }}>
          {showSlash && <SlashPopup input={input} onPick={cmd => { setInput(cmd); setShowSlash(false); }}/>}

          {/* Attach */}
          <button onClick={() => fileRef.current?.click()} disabled={uploading} title="上传需求表格" style={{ padding: 6, borderRadius: 6, color: 'var(--ink-2)', opacity: uploading ? 0.5 : 1 }}>
            {uploading
              ? <div style={{ width: 14, height: 14, borderRadius: 99, border: '2px solid var(--line-2)', borderTopColor: 'var(--accent)', animation: 'spin 0.8s linear infinite' }}/>
              : <I.paperclip size={14}/>
            }
          </button>
          <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{ display: 'none' }} onChange={handleFileChange}/>
          <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>

          {/* Text */}
          <input value={input} onChange={e => { setInput(e.target.value); setShowSlash(e.target.value.startsWith('/')); }}
            onKeyDown={e => { if (e.key === 'Escape') setShowSlash(false); if (e.key === 'Enter') { e.preventDefault(); handleSend(); } }}
            onBlur={() => setTimeout(() => setShowSlash(false), 150)}
            placeholder="输入指令或 / 触发快捷命令…"
            style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', fontSize: 13, lineHeight: 1.45, color: 'var(--ink)', fontFamily: 'inherit' }}
          />

          {/* Send */}
          <button onClick={handleSend} disabled={!input.trim()} style={{
            width: 30, height: 30, borderRadius: 8,
            background: input.trim() ? 'var(--ink)' : 'var(--line)',
            color: input.trim() ? 'white' : 'var(--ink-3)',
            display: 'grid', placeItems: 'center', transition: 'background 120ms',
          }}>
            <I.arrowUp size={14} stroke={2.2}/>
          </button>
        </div>
      </div>
    </div>
  );
};

window.Chat = Chat;

</script>

<script type="text/babel">
// -- src/app.jsx --
// App root — wires panels together, shares job/result state between Canvas and Chat

const App = () => {
  const [activeTemplate, setActiveTemplate] = React.useState(null);
  const [currentJob, setCurrentJob] = React.useState(null);
  const [resultImageUrl, setResultImageUrl] = React.useState(null);

  // When template changes, reset job + result
  const handleSelectTemplate = (t) => {
    setActiveTemplate(t);
    setCurrentJob(null);
    setResultImageUrl(null);
  };

  return (
    <div style={{
      height: '100vh', display: 'flex', flexDirection: 'column',
      overflow: 'hidden',
    }}>
      <TopBar/>
      <div style={{
        flex: 1,
        display: 'grid',
        gridTemplateColumns: '260px 1fr 360px',
        gridTemplateRows: 'minmax(0, 1fr)',
        minHeight: 0,
      }}>
        <TemplatePanel
          activeId={activeTemplate?.id}
          onSelect={handleSelectTemplate}
        />
        <Canvas
          template={activeTemplate}
          job={currentJob}
          resultImageUrl={resultImageUrl}
          onJobUpdate={setCurrentJob}
        />
        <Chat
          template={activeTemplate}
          onJobUpdate={(job) => {
            setCurrentJob(job);
            if (job?.status === 'done') {
              setResultImageUrl(API.getImageUrl(job.id));
            }
          }}
          onResultUrl={setResultImageUrl}
        />
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>

</body></html>
