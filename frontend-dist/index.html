<script>
// -- src/api.js --
// API client — wraps all backend calls (FastAPI at localhost:8000)

const BASE = window.API_BASE || 'http://localhost:8000';

async function request(path, init) {
  const resp = await fetch(`${BASE}${path}`, init);
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(`HTTP ${resp.status}: ${text.slice(0, 200)}`);
  }
  return resp.json();
}

// ── Health ────────────────────────────────────────────────────────────────────
async function fetchHealth() {
  return request('/health');
}

// ── Templates ─────────────────────────────────────────────────────────────────
async function fetchTemplates(fileId) {
  const qs = fileId ? `?file_id=${encodeURIComponent(fileId)}` : '';
  return request(`/templates${qs}`);
}

function getTemplateThumbnailUrl(templateId, pageId, fileId, refresh) {
  const qs = new URLSearchParams({ page_id: pageId });
  if (fileId) qs.set('file_id', fileId);
  if (refresh) qs.set('refresh', '1');
  return `${BASE}/templates/${templateId}/thumbnail?${qs}`;
}

// ── Parse table ───────────────────────────────────────────────────────────────
async function parseTable(file, requiredFields, imageType) {
  const form = new FormData();
  form.append('file', file);
  if (requiredFields && requiredFields.length > 0) {
    form.append('required_fields', requiredFields.join(','));
  }
  if (imageType) form.append('image_type', imageType);
  const resp = await fetch(`${BASE}/parse-table`, { method: 'POST', body: form });
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(`解析失败 HTTP ${resp.status}: ${text.slice(0, 200)}`);
  }
  return resp.json();
}

// ── Compose ───────────────────────────────────────────────────────────────────
async function createCompose(req) {
  return request('/compose', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(req),
  });
}

async function getCompose(jobId) {
  return request(`/compose/${jobId}`);
}

async function listComposes(limit = 20) {
  return request(`/compose?limit=${limit}`);
}

function getImageUrl(jobId) {
  return `${BASE}/compose/${jobId}/image`;
}

// ── Grid export ───────────────────────────────────────────────────────────────
async function exportGrid(jobId, rows, cols) {
  return request('/export/grid', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ job_id: jobId, rows, cols }),
  });
}

function getGridCellUrl(jobId, index) {
  return `${BASE}/export/grid/${jobId}/${String(index).padStart(2, '0')}`;
}

// ── Chat ──────────────────────────────────────────────────────────────────────
async function chatWithAI(messages, context) {
  const resp = await fetch(`${BASE}/chat`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, context: context || {} }),
  });
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(`HTTP ${resp.status}: ${text.slice(0, 200)}`);
  }
  const data = await resp.json();
  return data.reply;
}

// ── Products ──────────────────────────────────────────────────────────────────
async function fetchProducts() {
  return request('/products');
}

async function fetchImageTypes() {
  const res = await request('/image-types');
  return res.types;
}

window.API = {
  fetchHealth,
  fetchTemplates,
  getTemplateThumbnailUrl,
  parseTable,
  createCompose,
  getCompose,
  listComposes,
  getImageUrl,
  exportGrid,
  getGridCellUrl,
  chatWithAI,
  fetchProducts,
  fetchImageTypes,
};

</script>

<script type="text/babel">
// -- src/Placeholders.jsx --
// Striped / gradient placeholder imagery. No hand-drawn illustrations.

const hashHue = (s) => {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return Math.abs(h) % 360;
};

const Stripe = ({ label, ratio = '4/5', tone = 'neutral', seed = 'x', tag }) => {
  const hue = tone === 'accent' ? 275 : tone === 'warm' ? 40 : hashHue(seed);
  const light = tone === 'accent' ? 0.92 : 0.96;
  const light2 = tone === 'accent' ? 0.88 : 0.93;
  return (
    <div style={{
      aspectRatio: ratio,
      position: 'relative',
      borderRadius: 8,
      overflow: 'hidden',
      background: `repeating-linear-gradient(135deg, oklch(${light} 0.02 ${hue}) 0 8px, oklch(${light2} 0.025 ${hue}) 8px 16px)`,
      border: '1px solid var(--line-2)',
    }}>
      {label && (
        <div className="mono" style={{
          position: 'absolute', left: 8, top: 8,
          fontSize: 9, letterSpacing: '0.02em',
          color: `oklch(0.45 0.05 ${hue})`,
          textTransform: 'uppercase',
        }}>{label}</div>
      )}
      {tag && (
        <div style={{
          position: 'absolute', right: 8, bottom: 8,
          fontSize: 10, color: `oklch(0.35 0.05 ${hue})`,
          background: 'rgba(255,255,255,0.85)',
          backdropFilter: 'blur(4px)',
          padding: '2px 6px', borderRadius: 4,
        }}>{tag}</div>
      )}
    </div>
  );
};

const Swatch = ({ color, label }) => (
  <div style={{ display: 'flex', flexDirection: 'column', gap: 4, minWidth: 0 }}>
    <div style={{ height: 28, borderRadius: 6, background: color, border: '1px solid rgba(0,0,0,0.05)' }}/>
    <div className="mono" style={{ fontSize: 9, color: 'var(--ink-3)', overflow: 'hidden', textOverflow: 'ellipsis' }}>{label}</div>
  </div>
);

window.Stripe = Stripe;
window.Swatch = Swatch;

</script>

<script type="text/babel">
// -- src/TopBar.jsx --
// Polls /health every 30s and renders a status dot + label
const StatusChip = ({ label, fetchUrl, okKey, okText, errText }) => {
  const [status, setStatus] = React.useState('loading'); // 'loading' | 'ok' | 'err'

  React.useEffect(() => {
    let alive = true;
    const check = async () => {
      try {
        const res = await fetch(fetchUrl);
        if (!res.ok) throw new Error();
        const data = await res.json();
        if (!alive) return;
        if (okKey) {
          // e.g. okKey='library' → data.library.connected
          setStatus(data[okKey]?.connected ? 'ok' : 'err');
        } else {
          setStatus(data.status === 'ok' ? 'ok' : 'err');
        }
      } catch {
        if (alive) setStatus('err');
      }
    };
    check();
    const iv = setInterval(check, 30000);
    return () => { alive = false; clearInterval(iv); };
  }, [fetchUrl, okKey]);

  const color = status === 'loading' ? 'var(--warn)' : status === 'ok' ? 'var(--ok)' : 'oklch(0.6 0.18 25)';
  const text  = status === 'loading' ? '检测中…'   : status === 'ok' ? okText      : errText;
  const pulse = status === 'loading';

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 5,
      padding: '4px 8px', borderRadius: 6,
      background: 'var(--panel-2)', border: '1px solid var(--line-2)',
      fontSize: 11,
    }}>
      <span style={{ position: 'relative', width: 7, height: 7, flexShrink: 0 }}>
        <span style={{ position: 'absolute', inset: 0, borderRadius: 99, background: color, transition: 'background 300ms' }}/>
        {pulse && <span style={{ position: 'absolute', inset: -2, borderRadius: 99, background: color, opacity: 0.3, animation: 'statusPulse 1.6s ease-in-out infinite' }}/>}
      </span>
      <span style={{ fontWeight: 500, color: 'var(--ink-2)' }}>{label}</span>
      <span className="mono" style={{ fontSize: 9.5, color: 'var(--ink-3)' }}>{text}</span>
      <style>{`@keyframes statusPulse{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.8);opacity:0}}`}</style>
    </div>
  );
};

const TopBar = () => {
  return (
    <div style={{
      height: 48, flexShrink: 0,
      display: 'flex', alignItems: 'center',
      padding: '0 14px', gap: 16,
      background: 'var(--panel)',
      borderBottom: '1px solid var(--line)',
    }}>
      {/* Logo */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, minWidth: 180 }}>
        <div style={{
          width: 22, height: 22, borderRadius: 6,
          background: 'linear-gradient(135deg, var(--ink) 0%, oklch(0.28 0.04 275) 100%)',
          display: 'grid', placeItems: 'center',
          color: 'white',
        }}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round">
            <path d="M4 20 V6 M4 6 C10 6, 10 14, 16 14 C22 14, 22 6, 20 6"/>
          </svg>
        </div>
        <span className="serif" style={{ fontSize: 18, letterSpacing: '-0.01em' }}>Loom</span>
        <span className="mono" style={{ fontSize: 9, color: 'var(--ink-3)', padding: '2px 5px', borderRadius: 3, background: 'var(--panel-2)', border: '1px solid var(--line)' }}>BETA</span>
      </div>

      {/* Project crumb */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12.5, color: 'var(--ink-2)' }}>
        <span style={{ color: 'var(--ink-3)' }}>Autumn Campaign</span>
        <I.chevronRight size={10} stroke={1.8}/>
        <span style={{ color: 'var(--ink)' }}>Hero visual — Draft 03</span>
        <button style={{
          marginLeft: 4, padding: '3px 6px', borderRadius: 4,
          color: 'var(--ink-3)', fontSize: 10,
        }}>
          <I.chevronDown size={10} stroke={2}/>
        </button>
      </div>

      <div style={{ flex: 1 }}/>

      {/* Right cluster — live status chips */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        <StatusChip label="后端服务" fetchUrl="/health" okText="已连接" errText="离线"/>
        <StatusChip label="素材库" fetchUrl="/health" okKey="library" okText="已连接" errText="未连接"/>
      </div>
    </div>

<script type="text/babel">
// -- src/ChatExtras.jsx --
// Slash commands, parse table, AI message list — additions to the chat surface.

const SLASH_COMMANDS = [
  { cmd: '/generate',   cn: '开始生图',   desc: 'Generate variations from current parameters', icon: 'zap',     shortcut: '⌘⏎',  group: 'Generation' },
  { cmd: '/regenerate', cn: '重新生成',   desc: 'Re-run the last prompt with a new seed',       icon: 'refresh', group: 'Generation' },
  { cmd: '/upscale',    cn: '放大',       desc: 'Upscale selected option to 2K / 4K',           icon: 'layers',  group: 'Generation' },
  { cmd: '/variations', cn: '出更多版本', desc: 'Produce 4 more variants of the selected one',  icon: 'grid',    group: 'Generation' },

  { cmd: '/analyze',    cn: '分析素材',   desc: 'Parse an uploaded image, brief, or CSV',       icon: 'eye',     group: 'Tools' },
  { cmd: '/palette',    cn: '提取配色',   desc: 'Extract a palette from a reference',            icon: 'palette', group: 'Tools' },
  { cmd: '/resize',     cn: '换尺寸',     desc: 'Reflow the design into a new ratio',            icon: 'dims',    group: 'Tools' },
  { cmd: '/copy',       cn: '换文案',     desc: 'Rewrite on-image copy',                         icon: 'type',    group: 'Tools' },

  { cmd: '/export-png', cn: '导出PNG',    desc: 'Export selected option as PNG',                 icon: 'download', group: 'Export' },
  { cmd: '/export-psd', cn: '导出PSD',    desc: 'Export with editable layers',                   icon: 'download', group: 'Export' },
  { cmd: '/share',      cn: '分享链接',   desc: 'Generate a review link',                        icon: 'share',    group: 'Export' },
];

const SlashMenu = ({ query, onPick, onClose }) => {
  const q = query.toLowerCase().replace(/^\//, '');
  const filtered = SLASH_COMMANDS.filter(c =>
    !q || c.cmd.includes(q) || c.cn.includes(query.replace(/^\//, '')) || c.desc.toLowerCase().includes(q)
  );

  const groups = filtered.reduce((acc, c) => {
    (acc[c.group] ||= []).push(c); return acc;
  }, {});

  const [hover, setHover] = React.useState(0);
  React.useEffect(() => setHover(0), [query]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') { onClose(); return; }
      if (e.key === 'ArrowDown') { e.preventDefault(); setHover(h => Math.min(filtered.length - 1, h + 1)); }
      if (e.key === 'ArrowUp')   { e.preventDefault(); setHover(h => Math.max(0, h - 1)); }
      if (e.key === 'Enter' || e.key === 'Tab') {
        if (filtered[hover]) { e.preventDefault(); onPick(filtered[hover]); }
      }
    };
    window.addEventListener('keydown', onKey, true);
    return () => window.removeEventListener('keydown', onKey, true);
  }, [filtered, hover, onPick, onClose]);

  if (filtered.length === 0) {
    return (
      <div style={slashMenuStyle}>
        <div style={{ padding: 14, fontSize: 12, color: 'var(--ink-3)', textAlign: 'center' }}>
          No command matches "{query}"
        </div>
      </div>
    );
  }

  let idx = -1;
  return (
    <div style={slashMenuStyle}>
      <div style={{
        padding: '8px 12px 6px', fontSize: 10, color: 'var(--ink-3)',
        display: 'flex', alignItems: 'center', gap: 8,
        borderBottom: '1px solid var(--line-2)',
      }} className="mono">
        <span style={{ textTransform: 'uppercase', letterSpacing: '0.08em' }}>Commands</span>
        <div style={{ flex: 1 }}/>
        <span>↑↓ navigate · ⏎ pick · esc close</span>
      </div>

      <div style={{ maxHeight: 280, overflowY: 'auto', padding: 4 }}>
        {Object.entries(groups).map(([g, items]) => (
          <div key={g}>
            <div className="mono" style={{ padding: '6px 10px 2px', fontSize: 9.5, color: 'var(--ink-3)', textTransform: 'uppercase', letterSpacing: '0.07em' }}>{g}</div>
            {items.map(c => {
              idx++;
              const active = idx === hover;
              return (
                <button
                  key={c.cmd}
                  onMouseEnter={((i) => () => setHover(i))(idx)}
                  onClick={() => onPick(c)}
                  style={{
                    width: '100%', textAlign: 'left',
                    display: 'flex', alignItems: 'center', gap: 10,
                    padding: '7px 10px', borderRadius: 6,
                    background: active ? 'var(--accent-soft)' : 'transparent',
                  }}>
                  <div style={{
                    width: 22, height: 22, borderRadius: 5,
                    background: active ? 'var(--accent)' : 'var(--panel-2)',
                    color: active ? 'white' : 'var(--ink-2)',
                    display: 'grid', placeItems: 'center', flexShrink: 0,
                  }}>
                    {I[c.icon] ? I[c.icon]({ size: 12 }) : <I.bolt size={12}/>}
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
                      <span className="mono" style={{ fontSize: 11.5, fontWeight: 500, color: active ? 'var(--accent-ink)' : 'var(--ink)' }}>{c.cmd}</span>
                      <span style={{ fontSize: 10.5, color: 'var(--ink-3)' }}>{c.cn}</span>
                    </div>
                    <div style={{ fontSize: 10.5, color: 'var(--ink-3)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{c.desc}</div>
                  </div>
                  {c.shortcut && (
                    <kbd className="mono" style={{ fontSize: 9.5, color: 'var(--ink-3)', padding: '1px 5px', borderRadius: 3, border: '1px solid var(--line)' }}>{c.shortcut}</kbd>
                  )}
                </button>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
};

const slashMenuStyle = {
  position: 'absolute', bottom: 'calc(100% + 6px)', left: 0, right: 0,
  background: 'var(--panel)',
  border: '1px solid var(--line)',
  borderRadius: 10,
  boxShadow: '0 8px 32px rgba(20,22,40,0.10), 0 2px 6px rgba(20,22,40,0.04)',
  overflow: 'hidden',
  zIndex: 20,
};

// ---------- Parse table (structured analysis output) ----------

const ParseTable = ({ title, subtitle, rows, source }) => {
  return (
    <div style={{
      width: '100%', borderRadius: 10,
      background: 'var(--panel)', border: '1px solid var(--line-2)',
      overflow: 'hidden',
    }}>
      <div style={{ padding: '9px 12px', borderBottom: '1px solid var(--line-2)', display: 'flex', alignItems: 'center', gap: 8 }}>
        <div style={{ width: 20, height: 20, borderRadius: 5, background: 'var(--accent-soft)', color: 'var(--accent-ink)', display: 'grid', placeItems: 'center' }}>
          <I.file size={11}/>
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 11.5, fontWeight: 600 }}>{title}</div>
          {subtitle && <div className="mono" style={{ fontSize: 9.5, color: 'var(--ink-3)' }}>{subtitle}</div>}
        </div>
        {source && (
          <div className="mono" style={{ fontSize: 9.5, color: 'var(--ink-3)', padding: '2px 6px', borderRadius: 4, background: 'var(--panel-2)', border: '1px solid var(--line-2)' }}>
            {source}
          </div>
        )}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '92px 1fr 54px', fontSize: 11 }}>
        <HeadCell>Field</HeadCell>
        <HeadCell>Value</HeadCell>
        <HeadCell right>Conf.</HeadCell>

        {rows.map((r, i) => (
          <React.Fragment key={i}>
            <Cell top={i > 0}>
              <span className="mono" style={{ color: 'var(--ink-3)', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.04em' }}>{r.field}</span>
            </Cell>
            <Cell top={i > 0}>
              {r.editable ? (
                <span style={{
                  display: 'inline-flex', alignItems: 'center', gap: 5,
                  padding: '2px 6px', borderRadius: 4,
                  background: 'var(--panel-2)', border: '1px dashed var(--line)',
                  fontSize: 11, color: 'var(--ink)',
                }}>
                  {r.value}
                  <I.type size={9} style={{ color: 'var(--ink-3)' }}/>
                </span>
              ) : (
                <span style={{ color: 'var(--ink)' }}>{r.value}</span>
              )}
              {r.note && <div style={{ fontSize: 10, color: 'var(--ink-3)', marginTop: 2 }}>{r.note}</div>}
            </Cell>
            <Cell top={i > 0} right>

      </div>

      <div style={{

        display: 'flex', alignItems: 'center', gap: 6,
        background: 'var(--panel-2)',

        <div style={{ flex: 1 }}/>

        <button style={{ ...ghostBtn, background: 'var(--ink)', color: 'white', border: 'none' }}>
          Apply to design
        </button>
      </div>
    </div>
  );
};

const HeadCell = ({ children, right }) => (
  <div style={{
    padding: '6px 12px',
    fontSize: 9.5, color: 'var(--ink-3)',
    textTransform: 'uppercase', letterSpacing: '0.06em',
    fontFamily: 'JetBrains Mono, monospace',

    background: 'var(--panel-2)',

  }}>{children}</div>
);

const Cell = ({ children, right, top }) => (

const ConfBadge = ({ conf }) => {
  const map = {
    high:   { l: 'High', c: 'var(--ok)',    bg: 'oklch(0.95 0.04 155)' },

  }[conf] || { l: '–', c: 'var(--ink-3)', bg: 'var(--panel-2)' };
  return (
    <span style={{
      display: 'inline-block',
      fontSize: 9.5, fontWeight: 500,
      padding: '1px 6px', borderRadius: 99,
      color: map.c, background: map.bg,
    }}>{map.l}</span>
  );
};

const ghostBtn = {
  fontSize: 11, padding: '4px 9px', borderRadius: 5,
  border: '1px solid var(--line)', background: 'var(--panel)',
  color: 'var(--ink-2)',
};

// ---------- AI structured message list ----------

const MessageList = ({ title, items }) => (
  <div style={{
    width: '100%', borderRadius: 10,
    background: 'var(--panel)', border: '1px solid var(--line-2)',

  }}>

      <span style={{ fontSize: 11.5, fontWeight: 600 }}>{title}</span>
      <div style={{ flex: 1 }}/>
      <span className="mono" style={{ fontSize: 9.5, color: 'var(--ink-3)' }}>{items.length} items</span>

    <div>
      {items.map((it, i) => (
        <div key={i} style={{

          display: 'flex', gap: 10, alignItems: 'flex-start',
        }}>
          <div style={{
            width: 18, height: 18, borderRadius: 5, flexShrink: 0,
            background: it.kind === 'warn' ? 'oklch(0.96 0.04 70)' : it.kind === 'ok' ? 'oklch(0.95 0.04 155)' : 'var(--accent-soft)',
            color: it.kind === 'warn' ? 'var(--warn)' : it.kind === 'ok' ? 'var(--ok)' : 'var(--accent-ink)',
            display: 'grid', placeItems: 'center',
          }}>
            {it.kind === 'warn' ? <I.bolt size={10}/> : it.kind === 'ok' ? <I.check size={11} stroke={2.4}/> : <I.dot size={10}/>}
          </div>

// ---------- Slash command acknowledgement bubble ----------

const CommandEcho = ({ cmd, cn }) => (

<script type="text/babel">
// -- src/Canvas.jsx --
// Main canvas — now simplified to just show the selected template preview.

const Canvas = ({ template }) => {
  const t = template;

  return (
    <div style={{
      display: 'flex', flexDirection: 'column', minWidth: 0, minHeight: 0,
      overflow: 'hidden',
      background: 'var(--panel-2)',
    }}>
      {/* Minimal toolbar */}
      <div style={{
        height: 44, flexShrink: 0,
        borderBottom: '1px solid var(--line)',
        display: 'flex', alignItems: 'center',
        padding: '0 16px', gap: 10,
        background: 'var(--panel)',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12 }}>
          <span className="mono" style={{ color: 'var(--ink-3)', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.06em' }}>Template</span>
          <span style={{ color: 'var(--ink)', fontWeight: 500 }}>{t?.name || 'None selected'}</span>
          {t && (
            <span className="mono" style={{ fontSize: 10, color: 'var(--ink-3)', padding: '2px 6px', borderRadius: 4, background: 'var(--panel-2)', border: '1px solid var(--line-2)' }}>{t.tag}</span>
          )}
        </div>

        <div style={{ flex: 1 }}/>

        <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 11, color: 'var(--ink-3)' }}>
          <button style={iconBtnStyle} title="Zoom out"><I.close size={12}/></button>
          <span className="mono">100%</span>
          <button style={iconBtnStyle} title="Zoom in"><I.plus size={12}/></button>
          <div style={{ width: 1, height: 16, background: 'var(--line)', margin: '0 4px' }}/>
          <button style={iconBtnStyle} title="Fit"><I.dims size={12}/></button>
        </div>
      </div>

      {/* Canvas stage */}
      <div style={{
        flex: 1, minHeight: 0, overflow: 'hidden',
        position: 'relative',
        background: `
          radial-gradient(circle at 1px 1px, oklch(0.9 0.005 260) 1px, transparent 0)
        `,
        backgroundSize: '20px 20px',
        backgroundColor: 'oklch(0.98 0.003 260)',
      }}>
        {t ? <TemplatePreview t={t}/> : <EmptyCanvas/>}
      </div>
    </div>
  );
};

const iconBtnStyle = {
  width: 24, height: 24, borderRadius: 5,
  display: 'grid', placeItems: 'center',
  color: 'var(--ink-2)',
};

const TemplatePreview = ({ t }) => {
  const stageRef = React.useRef(null);
  const [box, setBox] = React.useState({ w: 560, h: 480 });
  React.useEffect(() => {
    if (!stageRef.current) return;
    const ro = new ResizeObserver(entries => {
      for (const e of entries) {
        const { width, height } = e.contentRect;
        setBox({ w: Math.max(200, width - 80), h: Math.max(200, height - 120) });
      }
    });
    ro.observe(stageRef.current);
    return () => ro.disconnect();
  }, []);
  const [w, h] = ratioToSize(t.ratio, box.w, box.h);
  const cat = t.cat;

  return (
    <div ref={stageRef} style={{ position: 'absolute', inset: 0, display: 'grid', placeItems: 'center', padding: 24 }}>
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14 }}>
      <div style={{
        position: 'relative',
        width: w, height: h,
        background: 'var(--panel)',
        borderRadius: 6,
        boxShadow: '0 30px 60px rgba(20,22,40,0.10), 0 4px 14px rgba(20,22,40,0.06), 0 0 0 1px var(--line)',
        overflow: 'hidden',
      }}>
        <Stripe ratio={`${w}/${h}`} tone={t.tone} seed={t.id} label={t.name.split(' ')[0]} tag={t.tag}/>
        {/* ruler handles */}
        <Handles/>
      </div>

      {/* Meta strip */}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 10,
        padding: '6px 12px', borderRadius: 99,
        background: 'var(--panel)',
        border: '1px solid var(--line)',
        boxShadow: 'var(--shadow-1)',
        fontSize: 11,
      }}>
        <span className="mono" style={{ color: 'var(--ink-3)' }}>{cat}</span>
        <span style={{ width: 3, height: 3, borderRadius: 99, background: 'var(--line)' }}/>
        <span className="mono" style={{ color: 'var(--ink-2)' }}>{t.ratio.replace('/', ':')}</span>
        <span style={{ width: 3, height: 3, borderRadius: 99, background: 'var(--line)' }}/>
        <span className="mono" style={{ color: 'var(--ink-2)' }}>1280 × 1600 px</span>
        <span style={{ width: 3, height: 3, borderRadius: 99, background: 'var(--line)' }}/>
        <span style={{ color: 'var(--ink-2)' }}>Ready for chat input →</span>
      </div>
    </div>
    </div>
  );
};

const Handles = () => {
  const corners = [
    { top: -4, left: -4 }, { top: -4, right: -4 },
    { bottom: -4, left: -4 }, { bottom: -4, right: -4 },
  ];
  return (
    <>
      {corners.map((c, i) => (
        <div key={i} style={{
          position: 'absolute', ...c,
          width: 8, height: 8,
          background: 'white',
          border: '1.5px solid var(--accent)',
          borderRadius: 2,
        }}/>
      ))}
    </>
  );
};

const EmptyCanvas = () => (
  <div style={{ textAlign: 'center', color: 'var(--ink-3)', fontSize: 13 }}>
    Pick a template from the left rail to begin.
  </div>
);

// Translate ratio to pixel dimensions that fit nicely in the canvas area
const ratioToSize = (ratio, maxW = 560, maxH = 480) => {
  const [a, b] = ratio.split('/').map(Number);
  let w = maxW, h = (b / a) * maxW;
  if (h > maxH) { h = maxH; w = (a / b) * maxH; }
  return [Math.round(w), Math.round(h)];
};

window.Canvas = Canvas;

</script>

const OptionChips = ({ title, options, multi }) => {
  const [picked, setPicked] = React.useState(multi ? [options[0]] : options[0]);
  const isPicked = (o) => multi ? picked.includes(o) : picked === o;
  const toggle = (o) => {
    if (multi) setPicked(p => p.includes(o) ? p.filter(x => x !== o) : [...p, o]);
    else setPicked(o);
  };
  return (
    <div style={{
      borderRadius: 10, padding: 12, width: '100%',
      background: 'var(--panel)', border: '1px solid var(--line-2)',
    }}>
      <div style={{ fontSize: 11.5, fontWeight: 500, color: 'var(--ink)', marginBottom: 8 }}>{title}</div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5 }}>
        {options.map(o => (
          <button key={o} onClick={() => toggle(o)} style={{
            fontSize: 11.5, padding: '4px 10px', borderRadius: 99,
            background: isPicked(o) ? 'var(--ink)' : 'var(--panel-2)',
            color: isPicked(o) ? 'white' : 'var(--ink-2)',

const Composer = () => {
  const [text, setText] = React.useState('/');

  ]);
  const taRef = React.useRef(null);

  // Detect the current /slash token at the start of the input (simple model: line starts with /)
  const slashQuery = React.useMemo(() => {
    const m = text.match(/^\/\S*/);
    return m ? m[0] : null;
  }, [text]);

  const pickCommand = (c) => {
    setText(c.cmd + ' ');
    setTimeout(() => taRef.current?.focus(), 0);
  };

  return (
    <div style={{
      flexShrink: 0, padding: 12,
      borderTop: '1px solid var(--line)',

      position: 'relative',

          style={{

            background: 'transparent',
            fontSize: 13, lineHeight: 1.45, color: 'var(--ink)',
            fontFamily: 'inherit',
          }}
        />

          <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', marginTop: -2 }}>

      }}>
        <I.settings size={13} style={{ color: 'var(--ink-2)' }}/>
        <div style={{ flex: 1, fontSize: 12, fontWeight: 600 }}>Tweaks</div>
        <button onClick={onClose} style={{ padding: 3, color: 'var(--ink-3)', borderRadius: 4 }}>
          <I.close size={12}/>
        </button>
      </div>
      <div style={{ padding: 12, display: 'flex', flexDirection: 'column', gap: 12 }}>
        <TweakRow
          label="Chat state"
          sub="Empty · Generating · Returned"
          value={tweaks.chatState}
          options={[
            { k: 'empty', l: 'Empty' },
            { k: 'generating', l: 'Generating' },
            { k: 'returned', l: 'Returned' },
          ]}
          onChange={(v) => onChange({ chatState: v })}
        />
      </div>
      <div style={{
        padding: '8px 12px', borderTop: '1px solid var(--line-2)',
        fontSize: 10, color: 'var(--ink-3)',
      }} className="mono">
        Changes persist via host
      </div>
    </div>
  );
};

const TweakRow = ({ label, sub, value, options, onChange }) => (
  <div>
    <div style={{ fontSize: 11, fontWeight: 500, color: 'var(--ink)', marginBottom: 2 }}>{label}</div>
    {sub && <div className="mono" style={{ fontSize: 9.5, color: 'var(--ink-3)', marginBottom: 6 }}>{sub}</div>}
    <div style={{ display: 'flex', background: 'var(--panel-2)', borderRadius: 6, padding: 2, border: '1px solid var(--line-2)' }}>
      {options.map(o => (
        <button key={o.k} onClick={() => onChange(o.k)} style={{
          flex: 1, fontSize: 11, padding: '5px 6px', borderRadius: 4,
          background: value === o.k ? 'var(--panel)' : 'transparent',
          color: value === o.k ? 'var(--ink)' : 'var(--ink-3)',
          fontWeight: value === o.k ? 500 : 400,
          boxShadow: value === o.k ? 'var(--shadow-1)' : 'none',
        }}>{o.l}</button>
      ))}
    </div>
  </div>
);

window.Tweaks = Tweaks;

</script>

<script type="text/babel">
// -- src/app.jsx --
// App root — wires panels + tweaks + host communication

const App = () => {
  const DEFAULT_TWEAKS = { chatState: 'returned', canvasState: 'candidates', theme: 'light' };
  const [tweaks, setTweaks] = React.useState(window.TWEAKS || DEFAULT_TWEAKS);
  const [tweaksVisible, setTweaksVisible] = React.useState(false);
  const [activeTemplate, setActiveTemplate] = React.useState(TEMPLATES[0]);

  const updateTweaks = (partial) => {
    const next = { ...tweaks, ...partial };
    setTweaks(next);
    try {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: partial }, '*');
    } catch (e) {}
  };

  React.useEffect(() => {
    const handler = (e) => {
      const d = e.data;
      if (!d || typeof d !== 'object') return;
      if (d.type === '__activate_edit_mode') setTweaksVisible(true);
      if (d.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    try {
      window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    } catch (e) {}
    return () => window.removeEventListener('message', handler);
  }, []);

  return (
    <div style={{
      height: '100vh', display: 'flex', flexDirection: 'column',
      overflow: 'hidden',
    }}>
      <TopBar/>
      <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '260px 1fr 360px', gridTemplateRows: 'minmax(0, 1fr)', minHeight: 0 }}>
        <TemplatePanel activeId={activeTemplate?.id} onSelect={setActiveTemplate}/>
        <Canvas template={activeTemplate}/>
        <Chat state={tweaks.chatState}/>
      </div>
      <Tweaks
        visible={tweaksVisible}
        tweaks={tweaks}
        onChange={updateTweaks}
        onClose={() => setTweaksVisible(false)}
      />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>

</body></html>
