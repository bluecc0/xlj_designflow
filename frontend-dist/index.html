<style>
  :root {
    --bg: oklch(0.985 0.003 260);
    --panel: #ffffff;
    --panel-2: oklch(0.975 0.004 260);
    --line: oklch(0.92 0.005 260);
    --line-2: oklch(0.95 0.005 260);
    --ink: oklch(0.18 0.01 260);
    --ink-2: oklch(0.38 0.01 260);
    --ink-3: oklch(0.58 0.008 260);
    --accent: oklch(0.55 0.22 275);
    --accent-soft: oklch(0.96 0.03 275);
    --accent-ink: oklch(0.38 0.18 275);
    --warn: oklch(0.72 0.15 70);
    --ok: oklch(0.65 0.15 155);
    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 14px;
    --shadow-1: 0 1px 2px rgba(20,22,40,0.04), 0 1px 1px rgba(20,22,40,0.03);
    --shadow-2: 0 6px 24px rgba(20,22,40,0.06), 0 1px 2px rgba(20,22,40,0.04);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; font-size: 13px; letter-spacing: -0.005em; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea { font-family: inherit; }
  ::selection { background: var(--accent-soft); color: var(--accent-ink); }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .serif { font-family: 'Instrument Serif', serif; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: oklch(0.88 0.005 260); border-radius: 10px; border: 3px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: oklch(0.80 0.008 260); border: 3px solid transparent; background-clip: padding-box; }

<div id="root"></div>

<script>
  // Tweakable defaults — persisted by host
  window.TWEAKS = /*EDITMODE-BEGIN*/{
    "chatState": "returned",
    "canvasState": "candidates",
    "theme": "light"
  }/*EDITMODE-END*/;

<script>
// API client — non-module version of src/api.js
(function() {
  const BASE = window.API_BASE || (window.location.protocol + '//' + window.location.hostname + ':8000');

  function request(path, init) {
    return fetch(BASE + path, init).then(function(resp) {
      if (!resp.ok) {
        return resp.text().then(function(text) {
          throw new Error('HTTP ' + resp.status + ': ' + text.slice(0, 200));
        });
      }
      return resp.json();
    });
  }

  function getTemplateThumbnailUrl(templateId, pageId, fileId, refresh) {
    var qs = 'page_id=' + encodeURIComponent(pageId);
    if (fileId) qs += '&file_id=' + encodeURIComponent(fileId);
    if (refresh) qs += '&refresh=1';
    return BASE + '/templates/' + templateId + '/thumbnail?' + qs;
  }

  function parseTable(file, requiredFields, imageType) {
    var form = new FormData();

  const [status, setStatus] = React.useState('loading'); // 'loading' | 'ok' | 'err'

  React.useEffect(() => {
    let alive = true;
    const check = async () => {
      try {
        const res = await fetch(fetchUrl);
        if (!res.ok) throw new Error();
        const data = await res.json();
        if (!alive) return;
        if (okKey) {
          // e.g. okKey='library' → data.library.connected
          setStatus(data[okKey]?.connected ? 'ok' : 'err');
        } else {
          setStatus(data.status === 'ok' ? 'ok' : 'err');

        if (alive) setStatus('err');

const HeadCell = ({ children, right }) => (

);

const Cell = ({ children, right, top }) => (
  <div style={{
    padding: '8px 12px',
    borderTop: top ? '1px solid var(--line-2)' : 'none',
    textAlign: right ? 'right' : 'left',

);

const ConfBadge = ({ conf }) => {
  const map = {

    med:    { l: 'Med',  c: 'var(--warn)',  bg: 'oklch(0.96 0.04 70)' },

  return (
    <span style={{
      display: 'inline-block',
      fontSize: 9.5, fontWeight: 500,
      padding: '1px 6px', borderRadius: 99,
      color: map.c, background: map.bg,

};

const ghostBtn = {
  fontSize: 11, padding: '4px 9px', borderRadius: 5,

// ---------- Slash command acknowledgement bubble ----------

const CommandEcho = ({ cmd, cn }) => (

window.SlashMenu = SlashMenu;
window.SLASH_COMMANDS = SLASH_COMMANDS;
window.ParseTable = ParseTable;
window.MessageList = MessageList;

const FileCard = ({ name, size, type }) => (

const ThinkingTrace = ({ steps, done }) => {
  const [expanded, setExpanded] = React.useState(false);
  return (
    <div style={{
      borderRadius: 10, border: '1px solid var(--line-2)',
      background: 'var(--panel-2)',
      overflow: 'hidden',

        width: '100%', textAlign: 'left',
        padding: '8px 11px',
        display: 'flex', alignItems: 'center', gap: 8,

        <I.chevronRight size={11} style={{ transform: expanded ? 'rotate(90deg)' : 'none', transition: 'transform 120ms' }}/>

      </button>
      {expanded && (
        <div style={{ padding: '2px 11px 10px 28px', borderTop: '1px solid var(--line-2)' }}>
          {steps.map((s, i) => (
            <div key={i} style={{ fontSize: 11.5, color: 'var(--ink-2)', padding: '5px 0', display: 'flex', gap: 8 }}>
              <span className="mono" style={{ color: 'var(--ink-3)', minWidth: 14 }}>{i + 1}</span>
              <span>{s}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

const OptionChips = ({ title, options, multi }) => {
  const [picked, setPicked] = React.useState(multi ? [options[0]] : options[0]);
  const isPicked = (o) => multi ? picked.includes(o) : picked === o;
  const toggle = (o) => {
    if (multi) setPicked(p => p.includes(o) ? p.filter(x => x !== o) : [...p, o]);
    else setPicked(o);
  };
  return (
    <div style={{
      borderRadius: 10, padding: 12, width: '100%',
      background: 'var(--panel)', border: '1px solid var(--line-2)',
    }}>
      <div style={{ fontSize: 11.5, fontWeight: 500, color: 'var(--ink)', marginBottom: 8 }}>{title}</div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5 }}>
        {options.map(o => (
          <button key={o} onClick={() => toggle(o)} style={{
            fontSize: 11.5, padding: '4px 10px', borderRadius: 99,
            background: isPicked(o) ? 'var(--ink)' : 'var(--panel-2)',
            color: isPicked(o) ? 'white' : 'var(--ink-2)',
            border: '1px solid',
            borderColor: isPicked(o) ? 'var(--ink)' : 'var(--line-2)',
            transition: 'all 100ms',

  );
};

  );
};

      ) : (
        messages.map((m, i) => (
          <Bubble key={i} who={m.who} meta={m.meta}>
            {m.type === 'parse-result' ? (() => {
                const matchedCount = m.data.products.filter(p => p.image_path).length;
                return (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                    <TextBubble who="ai">找到 {m.data.products.length} 个产品，其中 {matchedCount} 个已匹配图片，建议模板类型：<b>{m.data.suggested_template_type}</b></TextBubble>
                    <div style={{
                      width: '100%', borderRadius: 10,
                      background: 'var(--panel)', border: '1px solid var(--line-2)',
                      overflow: 'hidden',
                    }}>
                      <div style={{ padding: '9px 12px', borderBottom: '1px solid var(--line-2)', display: 'flex', alignItems: 'center', gap: 8 }}>
                        <div style={{ width: 20, height: 20, borderRadius: 5, background: 'var(--accent-soft)', color: 'var(--accent-ink)', display: 'grid', placeItems: 'center' }}>
                          <I.file size={11}/>
                        </div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 11.5, fontWeight: 600 }}>{m.data.products.length} 个产品</div>
                          <div className="mono" style={{ fontSize: 9.5, color: 'var(--ink-3)' }}>CSV · {m.data.suggested_template_type}</div>
                        </div>
                      </div>
                      {m.fields && m.fields.length > 0 && (
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr '.repeat(m.fields.length).trim() + ' 60px', fontSize: 11 }}>
                          {m.fields.map((f, fi) => (
                            <HeadCell key={f}>{f === 'image' ? '图片' : f === 'name' ? '产品名' : f === 'price' ? '价格' : f === 'tag' ? '标签' : f === 'spec' ? '规格' : f}</HeadCell>
                          ))}
                          <HeadCell right>匹配</HeadCell>
                          {m.data.products.map((p, j) => (
                            <React.Fragment key={j}>
                              {m.fields.map((f) => {
                                const val = p[f === 'image' ? 'image_path' : f];
                                return (
                                  <Cell key={f} top={j > 0}>
                                    {f === 'image' ? (
                                      val ? <span style={{ color: 'var(--ok)', fontSize: 10 }}>已匹配</span> : <span style={{ color: 'var(--ink-3)', fontSize: 10 }}>未匹配</span>
                                    ) : (
                                      <span style={{ fontWeight: f === 'name' ? 500 : 400 }}>{val || '—'}</span>
                                    )}
                                  </Cell>
                                );
                              })}
                              <Cell top={j > 0} right>
                                <span style={{ color: p.image_path ? 'var(--ok)' : 'var(--warn)', fontSize: 10 }}>
                                  {p.image_path ? '✓' : '—'}
                                </span>
                              </Cell>
                            </React.Fragment>
                          ))}
                        </div>
                      )}
                      {matchedCount > 0 && !isGenerating && (
                        <div style={{ padding: '10px 12px', borderTop: '1px solid var(--line-2)', display: 'flex', justifyContent: 'center' }}>
                          <button
                            onClick={() => onCompose && onCompose(template, m.data)}
                            style={{
                              fontSize: 12,
                              padding: '6px 20px',
                              borderRadius: 6,
                              background: 'var(--ink)',
                              color: 'white',
                              border: 'none',
                              cursor: 'pointer',
                            }}
                          >
                            开始生图
                          </button>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })() : m.type === 'generating' ? (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  {m.status === 'done' ? (
                    <>
                      <div style={{ width: 18, height: 18, borderRadius: 99, background: 'var(--ok)' }}/>
                      <span style={{ fontSize: 13, color: 'var(--ok)', fontWeight: 600 }}>生成完成</span>
                    </>
                  ) : m.status === 'failed' ? (
                    <>
                      <div style={{ width: 18, height: 18, borderRadius: 99, background: 'var(--warn)' }}/>
                      <span style={{ fontSize: 13, color: 'var(--warn)', fontWeight: 600 }}>生成失败</span>
                    </>
                  ) : (
                    <>
                      <div style={{ width: 18, height: 18, borderRadius: 99, border: '2px solid var(--line)', borderRightColor: 'transparent', animation: 'spin 0.8s linear infinite' }}/>
                      <span style={{ fontSize: 13, color: 'var(--ink)', fontWeight: 500 }}>生成中...</span>
                    </>
                  )}
                </div>
                {m.logs && m.logs.length > 0 && (
                  <div style={{ padding: '10px 12px', border: '1px solid var(--line)', borderRadius: 8, background: 'var(--panel)' }}>
                    <div style={{ fontSize: 11, color: 'var(--ink-3)', marginBottom: 8, fontWeight: 500 }}>
                      进度 ({m.logs.length} 步)
                    </div>
                    <div style={{ maxHeight: 120, overflowY: 'auto', fontSize: 12, fontFamily: 'JetBrains Mono, monospace' }}>
                      {m.logs.map((log, i) => {
                        // Filter out verbose file paths and noisy messages
                        const isError = log.includes('Error') || log.includes('失败') || log.includes('error');
                        const isPath = log.includes('/') && (log.includes('.py') || log.includes('.png') || log.includes('\\'));
                        const cleanLog = isPath ? log.split('/').pop().split('\\').pop() : log;
                        return (
                          <div key={i} style={{
                            padding: '3px 0',
                            color: isError ? 'var(--warn)' : 'var(--ink)',
                            borderBottom: '1px solid var(--line-2)',
                          }}>
                            <span style={{ color: isError ? 'var(--warn)' : 'var(--accent)', marginRight: 8 }}>›</span>
                            {cleanLog}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
                {m.status === 'failed' && m.error && (
                  <div style={{ padding: '10px 12px', borderRadius: 6, background: 'var(--panel)', border: '1px solid var(--warn)', fontSize: 12, color: 'var(--warn)' }}>
                    {m.error}
                  </div>
                )}
              </div>
            ) : (
              <TextBubble who={m.who}>{m.text}</TextBubble>
            )}
          </Bubble>
        ))
      )}
    </div>
  );
};

// ---------- Composer ----------

const Composer = ({ onSend, onParseTable, isLoading }) => {
  const [text, setText] = React.useState('');
  const [files, setFiles] = React.useState([]);
  const [imageType, setImageType] = React.useState('png');
  const taRef = React.useRef(null);
  const fileInputRef = React.useRef(null);

  // Image type options
  const IMAGE_TYPES = [
    { key: 'png', label: 'PNG' },
    { key: 'white', label: '白底' },
    { key: 'model', label: '模特' },
    { key: 'shadow', label: '阴影' },
    { key: 'white2x', label: '白底x2' },
  ];

  // Detect the current /slash token at the start of the input (simple model: line starts with /)
  const slashQuery = React.useMemo(() => {
    const m = text.match(/^\/\S*/);
    return m ? m[0] : null;
  }, [text]);

  const pickCommand = (c) => {
    setText(c.cmd + ' ');
    setTimeout(() => taRef.current?.focus(), 0);
  };

  const handleSend = () => {
    if (!text.trim() || isLoading) return;
    const msg = text.trim();
    setText('');
    onSend(msg);
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  };

  const handleFileSelect = (e) => {
    const fileList = e.target.files;
    if (!fileList || fileList.length === 0) return;
    const file = fileList[0];
    const fileObj = { name: file.name, size: formatFileSize(file.size), file: file, imageType };
    setFiles(prev => [...prev, fileObj]);
    // Call onParseTable if provided
    if (onParseTable) {
      onParseTable(file, file.name, imageType).catch(err => {
        console.error('Parse table error:', err);
      });
    }
    // Reset input
    e.target.value = '';
  };

  const formatFileSize = (bytes) => {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  };

  return (
    <div style={{
      flexShrink: 0, padding: 12,
      borderTop: '1px solid var(--line)',
      background: 'var(--panel)',
      position: 'relative',
    }}>
      <div style={{
        borderRadius: 12,
        border: slashQuery ? '1px solid var(--accent)' : '1px solid var(--line)',
        background: 'var(--panel-2)',
        padding: 10,
        display: 'flex', flexDirection: 'column', gap: 8,
        boxShadow: slashQuery ? '0 0 0 4px var(--accent-soft), var(--shadow-1)' : 'var(--shadow-1)',
        transition: 'box-shadow 150ms, border-color 150ms',
        position: 'relative',
      }}>
        {slashQuery && (
          <SlashMenu query={slashQuery} onPick={pickCommand} onClose={() => setText('')}/>
        )}

        {/* Image type selector */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
          {IMAGE_TYPES.map(t => (
            <button
              key={t.key}
              onClick={() => setImageType(t.key)}
              style={{
                fontSize: 11,
                padding: '3px 0',
                background: 'transparent',
                border: 'none',
                color: imageType === t.key ? 'var(--ink)' : 'var(--ink-3)',
                cursor: 'pointer',
                position: 'relative',
              }}
            >
              {t.label}
              {imageType === t.key && (
                <div style={{
                  position: 'absolute',
                  bottom: -2,
                  left: 0,
                  right: 0,
                  height: 2,
                  background: 'var(--accent)',
                  borderRadius: 1,
                }}/>
              )}
            </button>
          ))}
        </div>

        <textarea
          className="composer-textarea"
          ref={taRef}
          value={text}
          onChange={(e) => setText(e.target.value)}
          onKeyDown={handleKeyDown}
          placeholder="在这里开启对话吧，或者按/唤起指令菜单"
          rows={2}
          style={{
            border: 'none', outline: 'none', resize: 'none',
            background: 'transparent',
            fontSize: 13, lineHeight: 1.45, color: 'var(--ink)',
            fontFamily: 'inherit',
          }}
        />
        <style>{`.composer-textarea::placeholder { color: var(--ink-3); font-style: italic; font-size: 12px; opacity: 1; }`}</style>

        <input
          type="file"
          ref={fileInputRef}
          onChange={handleFileSelect}
          accept=".csv,.xlsx,.xls"
          style={{ display: 'none' }}
        />

        
        <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
          <button
            onClick={() => fileInputRef.current?.click()}
            style={{ padding: 6, borderRadius: 6, color: 'var(--ink-2)', cursor: 'pointer' }}
            title="Attach file"
          >
            <I.paperclip size={14}/>
          </button>
          <button style={{ padding: 6, borderRadius: 6, color: 'var(--ink-2)' }} title="Insert image">
            <I.image size={14}/>
          </button>
          <button style={{ padding: 6, borderRadius: 6, color: 'var(--ink-2)' }} title="Style">
            <I.palette size={14}/>
          </button>

          <div style={{ flex: 1 }}/>


          <button
            onClick={handleSend}
            style={{
              width: 30, height: 30, borderRadius: 8,
              background: (text || files.length) && !isLoading ? 'var(--ink)' : 'var(--line)',
              color: (text || files.length) && !isLoading ? 'white' : 'var(--ink-3)',
              display: 'grid', placeItems: 'center',
              cursor: (text || files.length) && !isLoading ? 'pointer' : 'default',
            }}>
            {isLoading ? (
              <div style={{ width: 14, height: 14, borderRadius: 99, border: '2px solid var(--ink-3)', borderRightColor: 'transparent', animation: 'spin 0.7s linear infinite' }}/>
            ) : (
              <I.arrowUp size={14} stroke={2.2}/>
            )}
          </button>
        </div>
      </div>


    </div>
  );
};

console.log('[History] Component definition starting');
const HistoryDropdown = () => {
  console.log('[History] Component rendering');
  const [open, setOpen] = React.useState(false);
  const [jobs, setJobs] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const ref = React.useRef(null);

  React.useEffect(() => {
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) {
        setOpen(false);
      }
    };
    if (open) {
      document.addEventListener('mousedown', handler);
    }
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  // Attach native click listener to button
  React.useEffect(() => {
    const btn = ref.current?.querySelector('.history-btn');
    if (btn) {
      const nativeHandler = (e) => {
        console.log('[History] NATIVE CLICK!');
        setOpen(o => {
          if (!o) loadHistory();
          return !o;
        });
      };
      btn.addEventListener('click', nativeHandler);
      return () => btn.removeEventListener('click', nativeHandler);
    }
  }, []);

  const loadHistory = async () => {
    console.log('[History] loadHistory called');
    setLoading(true);
    setJobs([]);
    try {
      console.log('[History] Calling listComposes API, window.API:', !!window.API);
      const data = await window.API.listComposes(20);
      console.log('[History] Received data:', data);
      setJobs(data || []);
    } catch (e) {
      console.error('[History] Failed to load history:', e);
    }
    setLoading(false);
  };

  const handleClick = (e) => {
    e.stopPropagation();
    console.log('[History] handleClick called, open was:', open);
    try {
      if (!open) {
        loadHistory();
      }
      setOpen(!open);
    } catch (err) {
      console.error('[History] Error in handleClick:', err);
    }
  };

  return (
    <div ref={ref} style={{ position: 'relative' }} onClick={() => console.log('[History] DIV CLICK!')}>
      <button
        className="history-btn"
        type="button"
        onClick={handleClick}
        onMouseDown={() => console.log('[History] MOUSE DOWN!')}
        style={{ padding: '5px 10px', borderRadius: 5, color: 'var(--ink)', background: 'var(--panel-2)', border: '1px solid var(--line)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}
        title="历史记录"
      >
        <span style={{ display: 'flex', fontSize: 12, fontWeight: 600 }}>历史</span>
      </button>
      {open && (
        <div style={{
          position: 'absolute',
          top: '100%',
          right: 0,
          marginTop: 4,
          width: 300,
          maxHeight: 360,
          overflowY: 'auto',
          background: 'var(--panel)',
          border: '1px solid var(--line)',
          borderRadius: 8,
          boxShadow: '0 8px 24px rgba(0,0,0,0.12)',
          zIndex: 1000,
        }}>
          <div style={{ padding: '8px 12px', borderBottom: '1px solid var(--line)', fontSize: 11, fontWeight: 600, color: 'var(--ink)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <span>历史记录</span>
            <button
              onClick={(e) => { e.stopPropagation(); loadHistory(); }}
              style={{ padding: 2, borderRadius: 3, color: 'var(--ink-3)', cursor: 'pointer' }}
              title="刷新"
            >
              <I.refresh size={11}/>
            </button>
          </div>
          {loading && (
            <div style={{ padding: 16, textAlign: 'center', color: 'var(--ink-3)', fontSize: 11 }}>
              加载中...
            </div>
          )}
          {!loading && jobs.length === 0 && (
            <div style={{ padding: 24, textAlign: 'center', color: 'var(--ink-3)', fontSize: 11 }}>
              暂无历史记录
            </div>
          )}
          {!loading && jobs.map(job => (
            <div
              key={job.id}
              onClick={() => {
                if (job.status === 'done') {
                  const imgUrl = window.API.getImageUrl(job.id);
                  window.open(imgUrl, '_blank');
                }
                setOpen(false);
              }}
              style={{
                padding: '10px 12px',
                borderBottom: '1px solid var(--line-2)',
                cursor: job.status === 'done' ? 'pointer' : 'default',
              }}
            >
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
                <div style={{
                  width: 8, height: 8, borderRadius: 99,
                  background: job.status === 'done' ? 'var(--ok)' : job.status === 'failed' ? 'var(--warn)' : 'var(--accent)',
                  flexShrink: 0,
                }}/>
                <span style={{ fontSize: 11, fontWeight: 500, color: 'var(--ink)', flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                  {job.request?.template_frame_id?.slice(0, 24) || '未知模板'}
                </span>
                <span style={{ fontSize: 9.5, color: job.status === 'done' ? 'var(--ok)' : job.status === 'failed' ? 'var(--warn)' : 'var(--ink-3)' }}>
                  {job.status === 'done' ? '完成' : job.status === 'failed' ? '失败' : '进行中'}

              <div style={{ fontSize: 9.5, color: 'var(--ink-3)', fontFamily: 'monospace' }}>
                {job.created_at ? new Date(job.created_at * 1000).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '—'}
                {job.progress && job.progress.length > 0 && <span style={{ marginLeft: 8 }}>· {job.progress.length} 步</span>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

console.log('[Main] Chat component definition');
const Chat = ({ state, template, onComposeComplete }) => {
  const [messages, setMessages] = React.useState([]);
  const [isLoading, setIsLoading] = React.useState(false);

  // Extract required fields from template slots (e.g., "slot/product_1/name" -> "name")
  const getTemplateFields = React.useCallback((t) => {
    if (!t || !t.slots || t.slots.length === 0) return ['name'];
    const fields = new Set();
    t.slots.forEach(s => {
      const parts = (s.name || '').split('/');
      if (parts.length >= 3) {
        fields.add(parts[2]); // e.g., "name" from "slot/product_1/name"
      }
    });
    const result = Array.from(fields);
    return result.length > 0 ? result : ['name'];
  }, []);

  const templateFields = getTemplateFields(template);

  const handleSend = React.useCallback(async (text) => {
    if (!text.trim() || isLoading) return;
    setIsLoading(true);
    // Add user message
    setMessages(msgs => [...msgs, { who: 'user', text }]);
    try {
      const reply = await window.API.chatWithAI(
        [{ role: 'user', content: text }],
        {}
      );
      setMessages(msgs => [...msgs, { who: 'ai', text: reply || '...', meta: 'Loom' }]);
    } catch (e) {
      setMessages(msgs => [...msgs, { who: 'ai', text: '错误: ' + (e.message || '未知错误'), meta: '错误' }]);
    }
    setIsLoading(false);
  }, [isLoading]);

  const handleParseTable = React.useCallback(async (file, filename, imageType) => {
    // Add user message showing file was uploaded
    setMessages(msgs => [...msgs, { who: 'user', text: '已上传 ' + filename, file: filename, imageType: imageType }]);
    setIsLoading(true);
    try {
      const result = await window.API.parseTable(file, templateFields, imageType);
      // Add AI message with parse result
      setMessages(msgs => [...msgs, {
        who: 'ai',
        type: 'parse-result',
        data: result,
        meta: '解析了 ' + result.products.length + ' 个产品',
        fields: templateFields
      }]);
    } catch (e) {
      setMessages(msgs => [...msgs, { who: 'ai', text: '解析错误: ' + (e.message || '未知错误'), meta: '错误' }]);
    }
    setIsLoading(false);
  }, [isLoading, templateFields]);

  const handleCompose = React.useCallback(async (template, parseResult) => {
    if (!template || !parseResult) return;
    // Build slots from products with image_path
    const slots = {};
    parseResult.products.forEach((p, i) => {
      if (p.image_path) {
        slots['product_' + (i + 1)] = {
          image_path: p.image_path,
          name: p.name || null,
          price: p.price || null,
          tag: p.tag || null,
          spec: p.spec || null,
        };
      }
    });
    if (Object.keys(slots).length === 0) return;
    setIsLoading(true);
    // Add generating message
    let msgId = null;
    setMessages(msgs => {
      msgId = msgs.length;
      return [...msgs, {
        who: 'ai',
        type: 'generating',
        jobId: null,
        logs: ['正在启动合成任务...'],
        meta: '生成中'
      }];
    });
    try {
      const job = await window.API.createCompose({
        file_id: template.file_id,
        template_frame_id: template.id,
        page_id: template.page_id,
        slots: slots,
        export_scale: 2.0,
      });
      // Poll for status
      const pollInterval = setInterval(async () => {
        try {
          const status = await window.API.getCompose(job.id);
          // Update logs
          setMessages(msgs => msgs.map((m, i) => {
            if (i !== msgId) return m;
            return {
              ...m,
              jobId: job.id,
              status: status.status,
              logs: status.progress || [],
              resultPath: status.result_path,
              error: status.error,
            };
          }));
          // Stop polling if done or failed
          if (status.status === 'done' || status.status === 'failed') {
            clearInterval(pollInterval);
            setIsLoading(false);
            if (status.status === 'done' && onComposeComplete) {
              onComposeComplete(job.id, status.penpot_edit_url);
            }
          }
        } catch (e) {
          clearInterval(pollInterval);
          setIsLoading(false);
          setMessages(msgs => msgs.map((m, i) => {
            if (i !== msgId) return m;
            return { ...m, status: 'failed', error: e.message };
          }));
        }
      }, 1000);
    } catch (e) {
      setMessages(msgs => msgs.map((m, i) => {
        if (i !== msgId) return m;
        return { ...m, status: 'failed', error: e.message };
      }));
      setIsLoading(false);
    }
  }, [templateFields]);

  return (
    <div style={{
      display: 'flex', flexDirection: 'column', height: '100%',
      background: 'var(--panel)',
      borderLeft: '1px solid var(--line)',
    }}>
      {/* Header */}
      <div style={{
        height: 44, flexShrink: 0,
        display: 'flex', alignItems: 'center',
        padding: '0 14px', gap: 8,
        borderBottom: '1px solid var(--line)',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
          <span style={{
            width: 7, height: 7, borderRadius: 99,
            background: isLoading ? 'var(--accent)' : 'var(--ok)',
            animation: isLoading ? 'pulse 1.2s ease-in-out infinite' : 'none',
          }}/>
          <span style={{ fontSize: 13, fontWeight: 600, letterSpacing: '-0.01em' }}>Ai助手</span>
          <span className="mono" style={{ fontSize: 10, color: 'var(--ink-3)' }}>
            {isLoading ? 'working…' : messages.length === 0 ? 'ready' : messages.length + ' messages'}
          </span>
        </div>
        <div style={{ flex: 1 }}/>
      </div>

      {state === 'empty' && messages.length === 0 && <ChatEmpty/>}
      {state === 'empty' && messages.length > 0 && <ChatReturned messages={messages} template={template} onCompose={handleCompose} isGenerating={isLoading}/>}
      {state === 'generating' && <ChatGenerating/>}
      {state === 'returned' && <ChatReturned messages={messages} template={template} onCompose={handleCompose} isGenerating={isLoading}/>}

      <Composer onSend={handleSend} onParseTable={handleParseTable} isLoading={isLoading}/>
    </div>
  );
};

window.Chat = Chat;

</script>
<script type="text/babel">
// Tweaks panel — toggle between chat/canvas states

const Tweaks = ({ visible, tweaks, onChange, onClose }) => {
  if (!visible) return null;
  return (
    <div style={{
      position: 'fixed', bottom: 16, right: 16, zIndex: 50,
      width: 260, borderRadius: 12,
      background: 'var(--panel)',
      border: '1px solid var(--line)',
      boxShadow: '0 10px 40px rgba(20,22,40,0.14), 0 2px 8px rgba(20,22,40,0.05)',
      overflow: 'hidden',
    }}>
      <div style={{
        padding: '10px 12px',
        display: 'flex', alignItems: 'center', gap: 8,
        borderBottom: '1px solid var(--line-2)',
      }}>
        <I.settings size={13} style={{ color: 'var(--ink-2)' }}/>
        <div style={{ flex: 1, fontSize: 12, fontWeight: 600 }}>Tweaks</div>
        <button onClick={onClose} style={{ padding: 3, color: 'var(--ink-3)', borderRadius: 4 }}>
          <I.close size={12}/>
        </button>
      </div>
      <div style={{ padding: 12, display: 'flex', flexDirection: 'column', gap: 12 }}>
        <TweakRow
          label="Chat state"
          sub="Empty · Generating · Returned"
          value={tweaks.chatState}
          options={[
            { k: 'empty', l: 'Empty' },
            { k: 'generating', l: 'Generating' },
            { k: 'returned', l: 'Returned' },
          ]}
          onChange={(v) => onChange({ chatState: v })}
        />
      </div>
      <div style={{
        padding: '8px 12px', borderTop: '1px solid var(--line-2)',
        fontSize: 10, color: 'var(--ink-3)',
      }} className="mono">
        Changes persist via host
      </div>
    </div>
  );
};

const TweakRow = ({ label, sub, value, options, onChange }) => (
  <div>
    <div style={{ fontSize: 11, fontWeight: 500, color: 'var(--ink)', marginBottom: 2 }}>{label}</div>
    {sub && <div className="mono" style={{ fontSize: 9.5, color: 'var(--ink-3)', marginBottom: 6 }}>{sub}</div>}
    <div style={{ display: 'flex', background: 'var(--panel-2)', borderRadius: 6, padding: 2, border: '1px solid var(--line-2)' }}>
      {options.map(o => (
        <button key={o.k} onClick={() => onChange(o.k)} style={{
          flex: 1, fontSize: 11, padding: '5px 6px', borderRadius: 4,
          background: value === o.k ? 'var(--panel)' : 'transparent',
          color: value === o.k ? 'var(--ink)' : 'var(--ink-3)',
          fontWeight: value === o.k ? 500 : 400,
          boxShadow: value === o.k ? 'var(--shadow-1)' : 'none',
        }}>{o.l}</button>
      ))}
    </div>
  </div>
);

window.Tweaks = Tweaks;

</script>
<script type="text/babel">
// App root — wires panels + tweaks + host communication

const App = () => {
  const DEFAULT_TWEAKS = { chatState: 'returned', canvasState: 'candidates', theme: 'light' };
  const [tweaks, setTweaks] = React.useState(window.TWEAKS || DEFAULT_TWEAKS);
  const [tweaksVisible, setTweaksVisible] = React.useState(false);
  const [activeTemplate, setActiveTemplate] = React.useState(TEMPLATES[0]);
  const [resultImage, setResultImage] = React.useState(null);

  const updateTweaks = (partial) => {
    const next = { ...tweaks, ...partial };
    setTweaks(next);
    try {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: partial }, '*');
    } catch (e) {}
  };

  const handleComposeComplete = React.useCallback((jobId, penpotEditUrl) => {
    if (jobId) {
      setResultImage(window.API.getImageUrl(jobId));
      if (penpotEditUrl) {
        window.resultPenpotUrl = penpotEditUrl;
      }
    }
  }, []);

  React.useEffect(() => {
    const handler = (e) => {
      const d = e.data;
      if (!d || typeof d !== 'object') return;
      if (d.type === '__activate_edit_mode') setTweaksVisible(true);
      if (d.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    try {
      window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    } catch (e) {}
    return () => window.removeEventListener('message', handler);
  }, []);

  return (
    <div style={{
      height: '100vh', display: 'flex', flexDirection: 'column',
      overflow: 'hidden',
    }}>
      <TopBar/>
      <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '260px 1fr 360px', gridTemplateRows: 'minmax(0, 1fr)', minHeight: 0 }}>
        <TemplatePanel activeId={activeTemplate?.id} onSelect={setActiveTemplate}/>
        <Canvas template={activeTemplate} resultImage={resultImage}/>
        <Chat state={tweaks.chatState} template={activeTemplate} onComposeComplete={handleComposeComplete}/>
      </div>
      <Tweaks
        visible={tweaksVisible}
        tweaks={tweaks}
        onChange={updateTweaks}
        onClose={() => setTweaksVisible(false)}
      />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>


</body></html>
