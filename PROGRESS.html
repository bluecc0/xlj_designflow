<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DesignFlow · Progress</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0a0a0b;
  --surface:  #111113;
  --surface2: #18181b;
  --border:   rgba(255,255,255,0.06);
  --border2:  rgba(255,255,255,0.1);
  --text:     #ededef;
  --sub:      #8b8b9a;
  --faint:    #4a4a58;
  --green:    #4ade80;
  --green-bg: rgba(74,222,128,0.08);
  --red:      #f87171;
  --red-bg:   rgba(248,113,113,0.08);
  --amber:    #fbbf24;
  --amber-bg: rgba(251,191,36,0.08);
  --blue:     #60a5fa;
  --blue-bg:  rgba(96,165,250,0.08);
  --violet:   #a78bfa;
  --violet-bg:rgba(167,139,250,0.08);
  --accent:   #5e6ad2;
}

html { font-size: 15px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

/* ── Page shell ── */
.page {
  max-width: 780px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}

/* ── Header ── */
.header {
  margin-bottom: 40px;
}
.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.header h1 {
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.3px;
}
.header-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 6px;
}
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 99px;
  border: 1px solid var(--border2);
  color: var(--sub);
  background: var(--surface);
}
.chip-dot {
  width: 5px; height: 5px; border-radius: 50%;
}

/* ── Stats row ── */
.stats {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1px;
  background: var(--border);
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.stat {
  background: var(--surface);
  padding: 14px 16px;
  cursor: pointer;
  transition: background .1s;
}
.stat:hover, .stat.active { background: var(--surface2); }
.stat.active .stat-num { color: var(--text); }
.stat-num {
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 5px;
  color: var(--sub);
  transition: color .1s;
}
.stat-lbl {
  font-size: 11px;
  color: var(--faint);
  text-transform: uppercase;
  letter-spacing: .06em;
}

/* ── Toolbar ── */
.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 28px 0 12px;
  gap: 10px;
}
.toolbar-left {
  font-size: 12px;
  color: var(--faint);
}
.toolbar-right {
  display: flex; gap: 6px;
}
.btn-sm {
  padding: 4px 10px;
  border-radius: 5px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--sub);
  font-size: 11px;
  cursor: pointer;
  transition: all .12s;
}
.btn-sm:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }

/* ── Section ── */
.section {
  margin-bottom: 2px;
}
.section-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  border-radius: 7px 7px 0 0;
  border: 1px solid var(--border);
  border-bottom: none;
  background: var(--surface);
  cursor: pointer;
  user-select: none;
  transition: background .1s;
}
.section-head:hover { background: var(--surface2); }
.section-head.collapsed { border-radius: 7px; border-bottom: 1px solid var(--border); margin-bottom: 2px; }

.section-icon { font-size: 13px; }
.section-name { font-size: 13px; font-weight: 500; flex: 1; }
.section-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 1px 7px;
  border-radius: 99px;
}
.badge-done   { background: var(--green-bg);  color: var(--green); }
.badge-bug    { background: var(--red-bg);    color: var(--red);   }
.badge-wip    { background: var(--blue-bg);   color: var(--blue);  }
.badge-todo   { background: var(--amber-bg);  color: var(--amber); }
.badge-idea   { background: var(--violet-bg); color: var(--violet);}
.chevron { font-size: 9px; color: var(--faint); transition: transform .18s; }
.chevron.open { transform: rotate(90deg); }

.section-body {
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 7px 7px;
  overflow: hidden;
  margin-bottom: 6px;
}

/* ── Item ── */
.item {
  display: grid;
  grid-template-columns: 20px 1fr auto auto;
  align-items: start;
  gap: 10px;
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  transition: background .08s;
  position: relative;
}
.item:last-of-type { border-bottom: none; }
.item:hover { background: var(--surface2); }
.item:hover .item-acts { opacity: 1; }

.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  margin-top: 5px; justify-self: center; flex-shrink: 0;
}
.dot-done   { background: var(--green);  box-shadow: 0 0 6px var(--green-bg); }
.dot-bug    { background: var(--red);    box-shadow: 0 0 6px var(--red-bg);   }
.dot-wip    { background: var(--blue);   box-shadow: 0 0 6px var(--blue-bg);  }
.dot-todo   { background: var(--amber);  box-shadow: 0 0 6px var(--amber-bg); }
.dot-idea   { background: var(--violet); box-shadow: 0 0 6px var(--violet-bg);}

.item-body { min-width: 0; }
.item-title {
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.4;
}
.item-title.done { color: var(--sub); text-decoration: line-through; text-decoration-color: var(--faint); }
.item-desc {
  font-size: 12px;
  color: var(--sub);
  margin-top: 3px;
  line-height: 1.5;
}
.item-time {
  font-size: 11px;
  color: var(--faint);
  margin-top: 5px;
}

code {
  font-family: "SF Mono", "Cascadia Code", Consolas, monospace;
  font-size: 11px;
  background: rgba(255,255,255,.06);
  padding: 1px 5px;
  border-radius: 3px;
  color: var(--blue);
}

.item-tag {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 99px;
  white-space: nowrap;
  align-self: start;
  margin-top: 2px;
  border: 1px solid transparent;
}
.tag-be  { background: var(--blue-bg);   color: var(--blue);   border-color: rgba(96,165,250,.15); }
.tag-fe  { background: var(--violet-bg); color: var(--violet); border-color: rgba(167,139,250,.15); }
.tag-ops { background: rgba(255,255,255,.04); color: var(--sub);   border-color: var(--border2); }
.tag-ux  { background: var(--green-bg);  color: var(--green);  border-color: rgba(74,222,128,.15); }

.item-acts {
  display: flex; gap: 3px;
  opacity: 0; transition: opacity .12s;
  align-self: start; margin-top: 1px;
}
.act-btn {
  width: 20px; height: 20px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--faint);
  font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .1s;
}
.act-btn:hover { color: var(--text); border-color: var(--border2); }
.act-btn.del:hover { color: var(--red); border-color: rgba(248,113,113,.3); background: var(--red-bg); }

/* ── Add row ── */
.add-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  background: var(--surface);
  border-top: 1px dashed var(--border2);
}
.add-row input, .add-row select {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border2);
  color: var(--text);
  font-size: 12px;
  padding: 3px 0;
  outline: none;
  font-family: inherit;
  transition: border-color .12s;
}
.add-row input:focus, .add-row select:focus { border-color: var(--accent); }
.add-title { flex: 1.5; }
.add-desc  { flex: 2; }
.add-row select { color: var(--sub); }
.add-row select option { background: var(--surface2); }
.btn-add {
  padding: 3px 10px;
  border-radius: 5px;
  border: 1px solid rgba(94,106,210,.4);
  background: rgba(94,106,210,.1);
  color: #8b96e9;
  font-size: 11px; font-weight: 500;
  cursor: pointer; white-space: nowrap;
  transition: all .12s;
}
.btn-add:hover { background: rgba(94,106,210,.18); color: #b0b8f5; }

/* ── Edit modal ── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  z-index: 50;
}
.modal-bg.show { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 22px;
  width: 460px;
  display: flex; flex-direction: column; gap: 10px;
  box-shadow: 0 24px 64px rgba(0,0,0,.5);
}
.modal h3 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.modal label { font-size: 11px; color: var(--faint); text-transform: uppercase; letter-spacing: .05em; }
.modal input, .modal textarea, .modal select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  padding: 7px 10px;
  outline: none;
  font-family: inherit;
  resize: vertical;
  margin-top: 4px;
  transition: border-color .12s;
}
.modal input:focus, .modal textarea:focus, .modal select:focus { border-color: rgba(94,106,210,.5); }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
.btn-cancel {
  padding: 6px 14px; border-radius: 6px;
  border: 1px solid var(--border2);
  background: transparent; color: var(--sub);
  font-size: 12px; cursor: pointer;
}
.btn-cancel:hover { color: var(--text); }
.btn-save {
  padding: 6px 14px; border-radius: 6px;
  border: none; background: var(--accent);
  color: #fff; font-size: 12px; font-weight: 500; cursor: pointer;
}
.btn-save:hover { background: #6b75df; }

/* ── Footer ── */
.footer {
  margin-top: 48px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: var(--faint);
  flex-wrap: wrap; gap: 8px;
}
.footer a { color: var(--faint); text-decoration: none; }
.footer a:hover { color: var(--sub); }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div>
        <h1>DesignFlow</h1>
        <div class="header-meta">
          <span class="chip"><span class="chip-dot" style="background:var(--green)"></span>进行中</span>
          <span class="chip">Penpot + SiliconFlow</span>
          <span class="chip">FastAPI + React</span>
          <span class="chip" id="ts-chip"></span>
        </div>
      </div>
      <div style="display:flex;gap:6px;align-self:flex-start;margin-top:4px">
        <button class="btn-sm" onclick="exportData()">导出</button>
        <button class="btn-sm" onclick="importData()">导入</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats" id="stats"></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="toolbar-left" id="toolbar-info"></span>
  </div>

  <!-- Board -->
  <div id="board"></div>

  <!-- Footer -->
  <div class="footer">
    <span>数据存储在浏览器 localStorage，随时可导出备份</span>
    <span><a href="https://github.com/bluecc0/xlj_designflow" target="_blank">GitHub ↗</a></span>
  </div>

</div>

<!-- Edit modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>编辑条目</h3>
    <div>
      <label>标题</label>
      <input id="eTitle" placeholder="条目标题" />
    </div>
    <div>
      <label>描述</label>
      <textarea id="eDesc" placeholder="详细说明（可选）" rows="3"></textarea>
    </div>
    <div>
      <label>标签</label>
      <select id="eTag">
        <option value="be">后端</option>
        <option value="fe">前端</option>
        <option value="ops">运维</option>
        <option value="ux">设计</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveModal()">保存</button>
    </div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────

const SECTIONS = [
  { id:'done', label:'已完成',    icon:'●', badgeClass:'badge-done',  dotClass:'dot-done',  typeLabel:'done' },
  { id:'bug',  label:'Bug 修复', icon:'●', badgeClass:'badge-bug',   dotClass:'dot-bug',   typeLabel:'bug'  },
  { id:'wip',  label:'进行中',   icon:'●', badgeClass:'badge-wip',   dotClass:'dot-wip',   typeLabel:'wip'  },
  { id:'todo', label:'待完成',   icon:'●', badgeClass:'badge-todo',  dotClass:'dot-todo',  typeLabel:'todo' },
  { id:'idea', label:'想法',     icon:'●', badgeClass:'badge-idea',  dotClass:'dot-idea',  typeLabel:'idea' },
];

const TAG_MAP = { be:'后端', fe:'前端', ops:'运维', ux:'设计' };

// ── Default data ──────────────────────────────────────────────────────────────

const DEFAULTS = {
  done: [
    { id:1,  title:'Penpot Docker 本地部署',      desc:'docker-compose，启用 access token / 关闭邮件验证，localhost:9001', tag:'ops' },
    { id:2,  title:'Python Penpot 客户端库',       desc:'Transit+JSON 编解码、双 token 认证、图片上传、文字/图片写入、PNG 导出', tag:'be' },
    { id:3,  title:'FastAPI 后端（14 个端点）',    desc:'GET /templates · POST /compose · GET /compose/{id} · POST /export/grid · POST /parse-table · GET/POST/DELETE /products · POST /chat 等', tag:'be' },
    { id:4,  title:'Transit+JSON 写操作字段修复',  desc:'写操作必须用 kebab-case（fill-color 非 fillColor），修复多个 HTTP 500', tag:'be' },
    { id:5,  title:'文字 position-data 修复',      desc:'设为 null 强制 Penpot 重计算渲染缓存，解决 canvas 旧文字 / 编辑新文字双层问题', tag:'be' },
    { id:6,  title:'raw_content 样式保留策略',     desc:'深拷贝原始图层 content 只替换 text 字段，保留对齐、字体、旋转等所有样式', tag:'be' },
    { id:7,  title:'团队模板扫描',                 desc:'get-teams 遍历所有团队，project 名含「模板」即扫描其下所有文件，Board 作为模板条目', tag:'be' },
    { id:8,  title:'硅基流动 AI 表格解析',          desc:'Qwen2.5-72B，OpenAI 兼容接口，解析产品名/价格/标签/规格', tag:'be' },
    { id:9,  title:'AI 对话 + /指令系统',          desc:'POST /chat 注入工作台上下文，/ 前缀触发操作，普通文字调 AI', tag:'fe' },
    { id:10, title:'前端完整流程串联',              desc:'上传表格 → AI 解析 → 自动选模板 → 确认 → 合成 → 实时进度 → 完成通知 + 导出', tag:'fe' },
    { id:11, title:'Linear 设计系统 UI',           desc:'#08090a 背景 + #5e6ad2 accent，typing dots 动画，Inter 字体', tag:'fe' },
    { id:12, title:'模板缩略图懒加载',              desc:'首次 ~5s 生成后缓存，IntersectionObserver 按需加载', tag:'be' },
    { id:13, title:'产品图库前端管理',              desc:'拖拽/点击上传 + hover 删除，POST /products/upload + DELETE', tag:'fe' },
    { id:14, title:'合成任务 SQLite 持久化',        desc:'重启不丢失历史任务，GET /compose 返回历史列表', tag:'be' },
    { id:15, title:'九宫格切图',                   desc:'Pillow crop，POST /export/grid + GET /export/grid/{id}/{index}', tag:'be' },
    { id:16, title:'start.bat 一键启动',            desc:'kill 旧进程 → 启后端 → 等健康检查 → 启前端 → 打开浏览器', tag:'ops' },
  ],
  bug: [
    { id:101, title:'WSL 幽灵进程',               desc:'Claude bash 工具启动的进程 Windows taskkill 看不到，127.0.0.1:8000 绕过 start.bat kill 逻辑。解决：重启电脑', tag:'ops' },
    { id:102, title:'--reload 热重载不触发',       desc:'Claude 工具写文件不触发 watchfiles，需手动 Ctrl+C 重启才加载新代码', tag:'ops' },
  ],
  wip: [],
  todo: [
    { id:201, title:'移除 /debug/* 调试端点',      desc:'team-scan 和 text-layer 上线前需移除或加权限保护', tag:'be' },
    { id:202, title:'list_templates 加缓存',       desc:'当前串行请求多团队/project/文件，数量多时慢，加 TTL 缓存', tag:'be' },
    { id:203, title:'Penpot Token 自动刷新',       desc:'Token 30 天过期后全返回 401，需捕获后自动用邮密重登并重试', tag:'be' },
    { id:204, title:'更多模板设计',                desc:'4宫格、6宫格等，按 slot/product_N/image 命名规范', tag:'ux' },
  ],
  idea: [
    { id:301, title:'合成历史回放',                desc:'中栏展示最近几次合成结果，可一键重新导出', tag:'fe' },
    { id:302, title:'模板直达编辑',                desc:'模板卡片加「在 Penpot 里编辑」按钮，跳转编辑链接', tag:'fe' },
    { id:303, title:'批量合成队列',                desc:'支持上传多份表格，依次排队合成，完成后统一下载', tag:'be' },
  ],
};

// ── State ─────────────────────────────────────────────────────────────────────

let data = (() => {
  try { const s = localStorage.getItem('df-v2'); if (s) return JSON.parse(s); } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULTS));
})();

let nextId = Math.max(...Object.values(data).flat().map(i => i.id), 400) + 1;
let editTarget = null;
let activeFilter = 'all';
let collapsed = {};

function save() { localStorage.setItem('df-v2', JSON.stringify(data)); }

// ── Helpers ───────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function relTime(ts) {
  if (!ts) return '';
  const d = new Date(ts), now = Date.now(), ms = now - d;
  if (ms < 60000) return '刚刚';
  if (ms < 3600000) return `${Math.floor(ms/60000)}m 前`;
  if (ms < 86400000) return `${Math.floor(ms/3600000)}h 前`;
  if (ms < 2592000000) return `${Math.floor(ms/86400000)}d 前`;
  return d.toLocaleDateString('zh-CN',{month:'short',day:'numeric'});
}

function totalItems() {
  return Object.values(data).reduce((a,v) => a + v.length, 0);
}

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  renderStats();
  renderBoard();
  renderToolbar();
}

function renderStats() {
  const el = document.getElementById('stats');
  el.innerHTML = SECTIONS.map(s => {
    const n = (data[s.id]||[]).length;
    const active = activeFilter === s.id ? ' active' : '';
    const colors = { done:'var(--green)', bug:'var(--red)', wip:'var(--blue)', todo:'var(--amber)', idea:'var(--violet)' };
    return `<div class="stat${active}" onclick="setFilter('${s.id}')">
      <div class="stat-num" style="color:${active ? colors[s.id] : ''}">${n}</div>
      <div class="stat-lbl">${s.label}</div>
    </div>`;
  }).join('');
}

function renderToolbar() {
  const total = totalItems();
  const done = (data.done||[]).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('toolbar-info').textContent = `${total} 条记录 · ${done} 已完成 · ${pct}% 进度`;
}

function renderBoard() {
  const board = document.getElementById('board');
  const sections = activeFilter === 'all' ? SECTIONS : SECTIONS.filter(s => s.id === activeFilter);

  board.innerHTML = sections.map(sec => {
    const items = data[sec.id] || [];
    const isCollapsed = collapsed[sec.id];
    return `
    <div class="section">
      <div class="section-head${isCollapsed ? ' collapsed' : ''}" onclick="toggleCollapse('${sec.id}')">
        <span class="chevron ${isCollapsed ? '' : 'open'}">▶</span>
        <span class="section-name">${sec.label}</span>
        <span class="section-badge ${sec.badgeClass}">${items.length}</span>
      </div>
      ${isCollapsed ? '' : `
      <div class="section-body">
        ${items.map(item => renderItem(sec, item)).join('')}
        ${renderAddRow(sec.id)}
      </div>`}
    </div>`;
  }).join('');
}

function renderItem(sec, item) {
  const isDone = sec.id === 'done';
  const time = item.ts ? `<div class="item-time">${relTime(item.ts)}</div>` : '';
  return `
  <div class="item">
    <div class="status-dot ${sec.dotClass}"></div>
    <div class="item-body">
      <div class="item-title${isDone ? ' done' : ''}">${esc(item.title)}</div>
      ${item.desc ? `<div class="item-desc">${esc(item.desc)}</div>` : ''}
      ${time}
    </div>
    <span class="item-tag tag-${item.tag}">${TAG_MAP[item.tag]||item.tag}</span>
    <div class="item-acts">
      <button class="act-btn" onclick="openModal('${sec.id}',${item.id})" title="编辑">✎</button>
      <button class="act-btn" onclick="moveItem('${sec.id}',${item.id})" title="移动">⇄</button>
      <button class="act-btn del" onclick="deleteItem('${sec.id}',${item.id})" title="删除">✕</button>
    </div>
  </div>`;
}

function renderAddRow(secId) {
  return `
  <div class="add-row">
    <input class="add-title" id="at-${secId}" placeholder="添加条目…" onkeydown="if(event.key==='Enter')addItem('${secId}')"/>
    <input class="add-desc"  id="ad-${secId}" placeholder="描述"/>
    <select id="ag-${secId}">
      <option value="be">后端</option>
      <option value="fe">前端</option>
      <option value="ops">运维</option>
      <option value="ux">设计</option>
    </select>
    <button class="btn-add" onclick="addItem('${secId}')">+ 添加</button>
  </div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────

function setFilter(type) {
  activeFilter = activeFilter === type ? 'all' : type;
  render();
}

function toggleCollapse(secId) {
  collapsed[secId] = !collapsed[secId];
  render();
}

function addItem(secId) {
  const t = document.getElementById(`at-${secId}`);
  const title = t.value.trim();
  if (!title) { t.focus(); return; }
  const desc = document.getElementById(`ad-${secId}`).value.trim();
  const tag  = document.getElementById(`ag-${secId}`).value;
  data[secId] = data[secId] || [];
  data[secId].push({ id: nextId++, title, desc, tag, ts: new Date().toISOString() });
  save(); render();
}

function deleteItem(secId, id) {
  if (!confirm('删除这条记录？')) return;
  data[secId] = (data[secId]||[]).filter(i => i.id !== id);
  save(); render();
}

function moveItem(secId, id) {
  const opts = SECTIONS.filter(s => s.id !== secId);
  const names = opts.map((s,i) => `${i+1}. ${s.label}`).join('\n');
  const choice = prompt(`移动到：\n${names}`);
  if (!choice) return;
  const idx = parseInt(choice) - 1;
  if (isNaN(idx) || idx < 0 || idx >= opts.length) return;
  const item = (data[secId]||[]).find(i => i.id === id);
  if (!item) return;
  data[secId] = data[secId].filter(i => i.id !== id);
  item.ts = new Date().toISOString();
  data[opts[idx].id] = data[opts[idx].id] || [];
  data[opts[idx].id].push(item);
  save(); render();
}

// ── Modal ─────────────────────────────────────────────────────────────────────

function openModal(secId, id) {
  const item = (data[secId]||[]).find(i => i.id === id);
  if (!item) return;
  editTarget = { secId, id };
  document.getElementById('eTitle').value = item.title;
  document.getElementById('eDesc').value  = item.desc || '';
  document.getElementById('eTag').value   = item.tag  || 'be';
  document.getElementById('modalBg').classList.add('show');
  document.getElementById('eTitle').focus();
}

function closeModal() {
  editTarget = null;
  document.getElementById('modalBg').classList.remove('show');
}

function saveModal() {
  if (!editTarget) return;
  const { secId, id } = editTarget;
  const item = (data[secId]||[]).find(i => i.id === id);
  if (!item) return;
  item.title = document.getElementById('eTitle').value.trim() || item.title;
  item.desc  = document.getElementById('eDesc').value.trim();
  item.tag   = document.getElementById('eTag').value;
  item.ts    = new Date().toISOString();
  save(); closeModal(); render();
}

document.getElementById('modalBg').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ── Import / Export ───────────────────────────────────────────────────────────

function exportData() {
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `designflow-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importData() {
  const input = document.createElement('input');
  input.type='file'; input.accept='.json';
  input.onchange = e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (confirm('导入将覆盖当前数据，确认？')) {
          data = parsed;
          nextId = Math.max(...Object.values(data).flat().map(i=>i.id), 400) + 1;
          save(); render();
        }
      } catch { alert('JSON 格式错误'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── Init ──────────────────────────────────────────────────────────────────────

const now = new Date();
document.getElementById('ts-chip').textContent =
  now.toLocaleDateString('zh-CN',{month:'long',day:'numeric'}) + ' 更新';

render();
</script>
